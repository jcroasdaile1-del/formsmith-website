    async function handleChange(event) {
      const element = event.target;
      element.setCustomValidity?.('');
      if (element.name === 'preferredContact' && element.form?.elements.phone) element.form.elements.phone.setCustomValidity('');
      if (element.closest('#publicInquiryForm') && element.name) {
        syncPublicDraft(element.form);
        if (element.name === 'sessionType') {
          const allowed = new Set(coverageOptions(element.value));
          state.publicDraft.coveragePriorities = (state.publicDraft.coveragePriorities || []).filter((priority) => allowed.has(priority));
        }
        if (element.name === 'coveragePriority') {
          let selected = [...element.form.querySelectorAll('[name="coveragePriority"]:checked')];
          if (selected.length > 4) {
            element.checked = false;
            syncPublicDraft(element.form);
            selected = [...element.form.querySelectorAll('[name="coveragePriority"]:checked')];
            toast('Choose up to four priorities', 'Keep the list focused on what matters most for this shoot.');
          }
          const group = $('[data-priority-group]', element.form);
          group?.classList.toggle('invalid', selected.length === 0);
          group?.setAttribute('aria-invalid', selected.length === 0 ? 'true' : 'false');
          const hint = $('.selection-hint', group);
          if (hint) hint.textContent = selected.length ? `${selected.length}/4 selected` : 'Choose 1–4';
        }
      }
      if (element.dataset.change === 'lead-status') {
        const lead = state.data.leads.find((item) => item.id === element.dataset.id);
        if (!lead) return;
        const linkedSession = state.data.sessions.find((session) => session.leadId === lead.id && session.clientId === lead.clientId && isActiveBookingSession(session));
        if (linkedSession && !['Booked', 'Closed'].includes(element.value)) {
          element.value = lead.status;
          toast('Keep the booking linked', 'A booked inquiry can be closed or managed from its existing session.');
          return;
        }
        if (element.value === 'Booked' && !linkedSession) { element.value = lead.status; closeDrawer(); openSessionModal(null, { leadId: lead.id }); return; }
        lead.status = element.value;
        await persist('Pipeline updated', `${lead.name} moved to ${lead.status}.`);
        render();
        openLeadDrawer(lead.id);
      }
      if (element.closest('#sessionForm')) {
        if (element.name === 'date' && element.form.elements.deliveryDue) element.form.elements.deliveryDue.min = element.value;
        validateSessionRules(element.form, false);
        if (['date','startTime','duration','status'].includes(element.name)) updateConflictAlert();
      }
    }

    function handleInput(event) {
      const element = event.target;
      element.setCustomValidity?.('');
      if (element.id === 'globalSearch') { showGlobalResults(element.value); return; }
      if (element.closest('#publicInquiryForm') && element.name) syncPublicDraft(element.form);
      if (element.closest('#sessionForm')) {
        validateSessionRules(element.form, false);
        if (['date','startTime','duration'].includes(element.name)) updateConflictAlert();
      }
      if (element.id === 'leadSearch' || element.id === 'clientSearch') {
        const key = element.id === 'leadSearch' ? 'leadQuery' : 'clientQuery';
        state[key] = element.value;
        const cursor = element.selectionStart;
        render();
        requestAnimationFrame(() => { const next = $(`#${element.id}`); next?.focus(); next?.setSelectionRange?.(cursor, cursor); });
      }
    }

    async function handleSubmit(event) {
      const form = event.target.closest('form[data-form]');
      if (!form) return;
      event.preventDefault();
      if (form.dataset.form === 'public-inquiry') await submitPublicInquiry(form);
      else if (form.dataset.form === 'lead') await saveLeadForm(form);
      else if (form.dataset.form === 'client') await saveClientForm(form);
      else if (form.dataset.form === 'session') await saveSessionForm(form);
      else if (form.dataset.form === 'settings') await saveSettingsForm(form);
    }

    function handleKeydown(event) {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') { event.preventDefault(); $('#globalSearch')?.focus(); }
      if (event.key === 'ArrowDown' && event.target.id === 'globalSearch' && $('#searchResults')?.classList.contains('open')) {
        event.preventDefault();
        $('.search-result', $('#searchResults'))?.focus();
      } else if (['ArrowDown', 'ArrowUp'].includes(event.key) && event.target.closest('.search-result')) {
        const results = $$('.search-result', $('#searchResults'));
        const index = results.indexOf(event.target.closest('.search-result'));
        if (results.length) {
          event.preventDefault();
          results[(index + (event.key === 'ArrowDown' ? 1 : -1) + results.length) % results.length].focus();
        }
      }
      if (event.key === 'Tab') {
        const modal = $('#modalRoot')?.classList.contains('open') ? $('#modalRoot') : null;
        const drawer = !modal && $('#drawer')?.classList.contains('open') ? $('#drawer') : null;
        const mobileNav = !modal && !drawer && document.body.classList.contains('nav-open') && window.matchMedia('(max-width: 840px)').matches ? $('#studioSidebar') : null;
        const scope = modal || drawer || mobileNav;
        const focusable = focusableElements(scope);
        if (scope && focusable.length) {
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (event.shiftKey && (document.activeElement === first || !scope.contains(document.activeElement))) { event.preventDefault(); last.focus(); }
          else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
        }
      }
      if (event.key === 'Escape') {
        const searchWasOpen = $('#searchResults')?.classList.contains('open');
        $('#searchResults')?.classList.remove('open');
        $('#globalSearch')?.setAttribute('aria-expanded', 'false');
        if (searchWasOpen) { $('#globalSearch')?.focus(); return; }
        if (state.confirmResolve) finishConfirm(false);
        else if ($('#modalRoot').classList.contains('open')) closeModal();
        else if ($('#drawer').classList.contains('open')) closeDrawer();
        else { document.body.classList.remove('nav-open'); updateNavigationState(); $('[data-action="toggle-nav"]')?.focus(); }
      }
    }

    function handleDragStart(event) {
      const card = event.target.closest('.lead-card');
      if (!card) return;
      state.draggedLeadId = card.dataset.lead;
      card.classList.add('dragging');
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', state.draggedLeadId);
    }

    function handleDragOver(event) {
      const column = event.target.closest('[data-drop-status]');
      if (!column) return;
      event.preventDefault();
      $$('.pipeline-col.drag-over').forEach((item) => item.classList.remove('drag-over'));
      column.classList.add('drag-over');
    }

    async function handleDrop(event) {
      const column = event.target.closest('[data-drop-status]');
      if (!column) return;
      event.preventDefault();
      const id = event.dataTransfer.getData('text/plain') || state.draggedLeadId;
      const lead = state.data.leads.find((item) => item.id === id);
      $$('.pipeline-col.drag-over').forEach((item) => item.classList.remove('drag-over'));
      state.draggedLeadId = null;
      if (!lead || lead.status === column.dataset.dropStatus) return;
      const linkedSession = state.data.sessions.find((session) => session.leadId === lead.id && session.clientId === lead.clientId && isActiveBookingSession(session));
      if (linkedSession && column.dataset.dropStatus !== 'Booked') { toast('Keep the booking linked', 'Booked inquiries stay in Booked unless they are archived as Closed.'); render(); return; }
      if (column.dataset.dropStatus === 'Booked' && !linkedSession) { toast('Book the session to move this inquiry', 'Daylight keeps the client record and calendar linked.'); openLeadDrawer(lead.id); return; }
      lead.status = column.dataset.dropStatus;
      await persist('Inquiry moved', `${lead.name} is now in ${lead.status}.`);
      render();
    }

    function handleDragEnd(event) {
      event.target.closest('.lead-card')?.classList.remove('dragging');
      $$('.pipeline-col.drag-over').forEach((item) => item.classList.remove('drag-over'));
      setTimeout(() => { state.draggedLeadId = null; }, 0);
    }

    async function init() {
      const saved = await Store.load();
      state.data = normalizeData(saved);
      if (!saved) updateStorageMode(await Store.save(state.data));
      state.selectedClientId = state.data.clients[0]?.id || null;
      if (PUBLIC_MODE) $('.skip-link')?.setAttribute('href', '#public-main-content');
      document.addEventListener('click', handleClick);
      document.addEventListener('input', handleInput);
      document.addEventListener('change', handleChange);
      document.addEventListener('submit', handleSubmit);
      document.addEventListener('keydown', handleKeydown);
      document.addEventListener('dragstart', handleDragStart);
      document.addEventListener('dragover', handleDragOver);
      document.addEventListener('drop', handleDrop);
      document.addEventListener('dragend', handleDragEnd);
      window.addEventListener('hashchange', () => { const view = location.hash.slice(1); if (VALID_VIEWS.includes(view) && view !== state.view) { closeDrawer(); closeModal(); state.view = view; render(); } });
      window.addEventListener('storage', async (event) => {
        if (event.key !== STORAGE_KEY) return;
        state.data = normalizeData(await Store.load());
        render();
        toast('Studio activity synced', 'A change from another Daylight tab is now visible.');
      });
      window.addEventListener('resize', updateNavigationState);
      render();
    }

    init();
  })();
  </script>
</body>
</html>
