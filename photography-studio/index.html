<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://getformsmith.com/projects/photography-studio-manager.html">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Daylight Studio is an interactive photographer CRM for inquiries, clients, sessions, shoot preparation, and delivery tracking.">
  <meta name="theme-color" content="#1f211f">
  <title>Daylight Studio — Photography Business Manager</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #20211f;
      --ink-2: #343632;
      --canvas: #f4f0e9;
      --paper: #fffdf9;
      --paper-2: #f9f6f0;
      --line: #ddd6cb;
      --line-strong: #c8bfb1;
      --muted: #68635c;
      --muted-2: #706b64;
      --copper: #a55237;
      --copper-dark: #7f3926;
      --copper-soft: #f3ded4;
      --sage: #5d7768;
      --sage-soft: #dfe9e2;
      --gold: #b17a2d;
      --gold-soft: #f6e9cd;
      --rose: #9a5b60;
      --rose-soft: #f3e1e2;
      --blue: #526d7c;
      --blue-soft: #e1eaee;
      --danger: #a83d35;
      --danger-soft: #f8dfdc;
      --success: #416a52;
      --shadow-sm: 0 1px 2px rgba(34, 30, 24, .05), 0 5px 18px rgba(34, 30, 24, .04);
      --shadow-md: 0 18px 45px rgba(35, 28, 20, .12);
      --shadow-lg: 0 28px 80px rgba(26, 22, 18, .24);
      --radius: 16px;
      --radius-sm: 10px;
      --sidebar: 252px;
      --topbar: 76px;
      --ribbon-height: 34px;
      --ease: cubic-bezier(.2,.8,.2,1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--canvas);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body.modal-open { overflow: hidden; }
    button, input, select, textarea { font: inherit; }
    button, [role="button"] { cursor: pointer; }
    button { color: inherit; }
    img { display: block; max-width: 100%; }
    a { color: inherit; }
    h1, h2, h3, h4, p { margin: 0; }
    h1, h2, h3, .display { font-family: Georgia, "Times New Roman", serif; font-weight: 500; letter-spacing: -.025em; }
    .icon { width: 18px; height: 18px; display: inline-block; flex: 0 0 auto; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .skip-link { position: fixed; z-index: 200; left: 12px; top: -100px; padding: 10px 14px; border-radius: 8px; background: var(--ink); color: white; transition: top .2s; }
    .skip-link:focus { top: 12px; }

    .demo-ribbon {
      height: var(--ribbon-height);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: #171a18;
      color: #f8f2e9;
      font-size: 12px;
      position: relative;
      z-index: 70;
    }
    .demo-ribbon strong { font-weight: 750; }
    .demo-state { display: inline-flex; align-items: center; gap: 7px; }
    .live-dot { width: 7px; height: 7px; border-radius: 999px; background: #76d39b; box-shadow: 0 0 0 4px rgba(118,211,155,.12); }
    body.storage-warning .live-dot { background: #f0b85c; box-shadow: 0 0 0 4px rgba(240,184,92,.14); }
    .ribbon-actions { position: absolute; right: 10px; display: flex; align-items: center; gap: 4px; }
    .ribbon-btn { min-height: 28px; border: 0; padding: 4px 8px; border-radius: 6px; background: transparent; color: inherit; font-weight: 700; font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
    .ribbon-btn:hover { background: rgba(255,255,255,.1); }
    .ribbon-btn .icon { width: 14px; height: 14px; }
    body.ribbon-hidden .demo-ribbon { display: none; }

    .app-shell { min-height: calc(100vh - var(--ribbon-height)); }
    .sidebar {
      position: fixed;
      z-index: 50;
      inset: var(--ribbon-height) auto 0 0;
      width: var(--sidebar);
      display: flex;
      flex-direction: column;
      background: var(--ink);
      color: #f4eee5;
      border-right: 1px solid rgba(255,255,255,.06);
      transition: transform .25s var(--ease);
    }
    body.ribbon-hidden .sidebar { top: 0; }
    .brand { min-height: 88px; display: flex; align-items: center; gap: 12px; padding: 17px 19px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .brand-mark { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; border: 1px solid rgba(255,255,255,.34); color: #e9a98d; position: relative; }
    .brand-mark::before, .brand-mark::after { content: ""; position: absolute; background: currentColor; opacity: .7; }
    .brand-mark::before { width: 18px; height: 1px; }
    .brand-mark::after { width: 1px; height: 18px; }
    .brand-mark .icon { width: 23px; height: 23px; stroke-width: 1.4; }
    .brand-copy strong { display: block; font-family: Georgia, serif; font-size: 17px; font-weight: 500; letter-spacing: -.01em; }
    .brand-copy span { display: block; margin-top: 2px; color: #aaa79f; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .14em; }
    .nav-wrap { padding: 20px 13px; overflow-y: auto; }
    .nav-label { margin: 0 10px 8px; color: #9b9d96; font-size: 10px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
    .nav-list { display: grid; gap: 4px; margin-bottom: 22px; }
    .nav-item { width: 100%; min-height: 44px; border: 0; border-radius: 10px; padding: 0 11px; display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 5px; background: transparent; color: #bbbcb6; text-align: left; font-weight: 680; transition: .15s ease; }
    .nav-item:hover { color: white; background: rgba(255,255,255,.055); }
    .nav-item.active { color: #fff8ef; background: #353833; box-shadow: inset 2px 0 #d98261; }
    .nav-item .icon { width: 17px; height: 17px; }
    .nav-count { min-width: 22px; height: 20px; padding: 0 6px; display: grid; place-items: center; border-radius: 999px; background: rgba(255,255,255,.09); color: #dedbd4; font-size: 10px; }
    .nav-item.active .nav-count { background: var(--copper); color: white; }
    .side-card { margin: auto 13px 13px; padding: 14px; border: 1px solid rgba(233,169,141,.28); border-radius: 14px; background: linear-gradient(145deg, rgba(165,82,55,.2), rgba(255,255,255,.035)); }
    .side-card .eyebrow { color: #e6a88e; }
    .side-card strong { display: block; margin: 5px 0 4px; font-family: Georgia, serif; font-size: 15px; font-weight: 500; }
    .side-card p { color: #aaa9a3; font-size: 11px; line-height: 1.45; }
    .side-card button { width: 100%; margin-top: 12px; }
    .sidebar-foot { padding: 0 13px 14px; }
    .profile-chip { display: grid; grid-template-columns: 35px 1fr auto; gap: 9px; align-items: center; padding: 9px; border-radius: 11px; background: rgba(255,255,255,.045); }
    .avatar { width: 35px; height: 35px; border-radius: 50%; display: grid; place-items: center; background: #685046; color: white; font-weight: 800; font-size: 11px; }
    .profile-chip strong { display: block; font-size: 12px; }
    .profile-chip > span:not(.avatar) > span { display: block; color: #999b94; font-size: 10px; }

    .workspace { min-height: calc(100vh - var(--ribbon-height)); margin-left: var(--sidebar); }
    .topbar { height: var(--topbar); padding: 0 28px; display: flex; align-items: center; gap: 16px; position: sticky; top: var(--ribbon-height); z-index: 35; background: rgba(244,240,233,.92); border-bottom: 1px solid rgba(200,191,177,.65); backdrop-filter: blur(18px); }
    body.ribbon-hidden .topbar { top: 0; }
    .icon-btn.menu-btn { display: none; }
    .global-search { width: min(420px, 42vw); position: relative; }
    .global-search > .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; color: var(--muted); pointer-events: none; }
    .global-search input { width: 100%; height: 42px; padding: 0 72px 0 40px; border: 1px solid var(--line); border-radius: 11px; outline: none; background: rgba(255,253,249,.8); color: var(--ink); transition: .15s; }
    .global-search input:focus { border-color: var(--copper); box-shadow: 0 0 0 3px rgba(165,82,55,.1); background: white; }
    .key-hint { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); padding: 2px 7px; border: 1px solid var(--line); border-radius: 6px; color: var(--muted-2); font-size: 10px; background: var(--paper); }
    .search-results { position: absolute; top: calc(100% + 8px); left: 0; right: 0; display: none; padding: 7px; border: 1px solid var(--line); border-radius: 12px; background: var(--paper); box-shadow: var(--shadow-md); }
    .search-results.open { display: grid; gap: 2px; }
    .search-result { width: 100%; border: 0; padding: 9px; border-radius: 8px; display: grid; grid-template-columns: 32px 1fr; gap: 9px; align-items: center; background: transparent; text-align: left; }
    .search-result:hover { background: var(--paper-2); }
    .search-result .result-icon { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; background: var(--copper-soft); color: var(--copper); }
    .search-result strong, .search-result span { display: block; }
    .search-result strong { font-size: 12px; }
    .search-result span { font-size: 10px; color: var(--muted); }
    .topbar-spacer { flex: 1; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn { width: 42px; height: 42px; padding: 0; border: 1px solid var(--line); border-radius: 11px; background: rgba(255,253,249,.8); display: inline-grid; place-items: center; transition: .15s ease; }
    .icon-btn:hover { background: white; border-color: var(--line-strong); transform: translateY(-1px); }
    .icon-btn.has-dot { position: relative; }
    .icon-btn.has-dot::after { content: ""; position: absolute; right: 9px; top: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--copper); border: 1px solid var(--paper); }

    .page { width: min(1540px, 100%); margin: 0 auto; padding: 31px 30px 48px; }
    .page-head { min-height: 65px; margin-bottom: 25px; display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
    .page-head h1 { font-size: clamp(31px, 3vw, 43px); line-height: 1; }
    .page-head p { margin-top: 8px; color: var(--muted); max-width: 650px; }
    .page-actions { display: flex; align-items: center; justify-content: flex-end; flex-wrap: wrap; gap: 8px; }
    .eyebrow { color: var(--copper); font-size: 10px; font-weight: 850; text-transform: uppercase; letter-spacing: .14em; }
    .btn { min-height: 42px; padding: 9px 15px; border: 1px solid transparent; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--ink); color: white; font-weight: 750; text-decoration: none; transition: transform .15s ease, box-shadow .15s ease, background .15s ease; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(32,33,31,.14); background: #30322f; }
    .btn.copper { background: var(--copper); }
    .btn.copper:hover { background: var(--copper-dark); }
    .btn.secondary { border-color: var(--line); background: var(--paper); color: var(--ink); }
    .btn.secondary:hover { background: white; }
    .btn.ghost { border-color: transparent; background: transparent; color: var(--ink); }
    .btn.ghost:hover { background: rgba(32,33,31,.06); box-shadow: none; }
    .btn.danger { background: var(--danger-soft); color: var(--danger); }
    .btn.small { min-height: 34px; padding: 6px 10px; border-radius: 8px; font-size: 12px; }
    .btn .icon { width: 16px; height: 16px; }
    .btn:disabled { cursor: not-allowed; opacity: .48; transform: none; box-shadow: none; }

    .grid { display: grid; gap: 16px; }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card { min-width: 0; border: 1px solid var(--line); border-radius: var(--radius); background: var(--paper); box-shadow: var(--shadow-sm); }
    .card-pad { padding: 18px; }
    .card-head { min-height: 65px; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); }
    .card-head h2 { font-family: Inter, sans-serif; font-size: 15px; font-weight: 800; letter-spacing: -.01em; }
    .card-head p { margin-top: 3px; color: var(--muted); font-size: 11px; }
    .metric-card { min-height: 122px; padding: 17px; position: relative; overflow: hidden; }
    .metric-card::after { content: ""; position: absolute; width: 78px; height: 78px; right: -29px; bottom: -33px; border-radius: 50%; background: var(--copper-soft); opacity: .55; }
    .metric-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .metric-label { color: var(--muted); font-size: 12px; font-weight: 650; }
    .metric-icon { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; background: var(--paper-2); color: var(--copper); }
    .metric-icon .icon { width: 16px; }
    .metric-value { margin-top: 8px; font-family: Georgia, serif; font-size: 29px; line-height: 1; letter-spacing: -.025em; }
    .metric-note { margin-top: 6px; color: var(--muted); font-size: 10px; }
    .metric-note strong { color: var(--success); }

    .dashboard-layout { margin-top: 16px; grid-template-columns: minmax(0, 1.55fr) minmax(320px, .85fr); align-items: start; }
    .dashboard-main, .dashboard-side { display: grid; gap: 16px; }
    .next-shoot { min-height: 340px; display: grid; grid-template-columns: minmax(0, 1fr) minmax(290px, .82fr); overflow: hidden; }
    .next-copy { padding: 25px; display: flex; flex-direction: column; }
    .next-copy h2 { margin-top: 8px; font-size: clamp(26px, 3vw, 37px); line-height: 1.04; }
    .next-copy > p { margin-top: 8px; color: var(--muted); }
    .shoot-meta { margin-top: 22px; display: grid; gap: 10px; }
    .meta-line { display: flex; align-items: center; gap: 9px; color: var(--ink-2); font-size: 12px; }
    .meta-line .icon { color: var(--copper); width: 16px; }
    .light-chip { width: fit-content; margin-top: 14px; padding: 7px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 7px; background: var(--gold-soft); color: #79531e; font-size: 11px; font-weight: 750; }
    .next-actions { margin-top: auto; padding-top: 22px; display: flex; gap: 8px; flex-wrap: wrap; }
    .next-photo { min-height: 270px; position: relative; overflow: hidden; background: #4d4943; }
    .next-photo img { width: 100%; height: 100%; object-fit: cover; object-position: 68% center; }
    .next-photo::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(32,33,31,.08), transparent 45%), linear-gradient(0deg, rgba(20,18,16,.45), transparent 48%); }
    .photo-caption { position: absolute; z-index: 2; left: 17px; bottom: 16px; color: white; }
    .photo-caption span { display: block; font-size: 10px; opacity: .8; text-transform: uppercase; letter-spacing: .1em; }
    .photo-caption strong { display: block; margin-top: 3px; font-family: Georgia, serif; font-size: 16px; font-weight: 500; }
    .readiness { margin-top: 21px; }
    .readiness-head { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
    .readiness-head strong { font-size: 12px; }
    .progress { height: 6px; margin-top: 8px; border-radius: 999px; overflow: hidden; background: #ebe5dc; }
    .progress span { height: 100%; display: block; border-radius: inherit; background: var(--sage); }
    .check-row { margin-top: 9px; display: flex; flex-wrap: wrap; gap: 6px; }
    .check-chip { padding: 4px 7px; border-radius: 999px; background: var(--paper-2); color: var(--muted); font-size: 9px; font-weight: 700; }
    .check-chip.done { background: var(--sage-soft); color: var(--success); }
    .agenda-list, .attention-list, .delivery-list { display: grid; }
    .agenda-item, .attention-item, .delivery-item { padding: 13px 17px; display: grid; gap: 10px; align-items: center; border-bottom: 1px solid var(--line); }
    .agenda-item:last-child, .attention-item:last-child, .delivery-item:last-child { border-bottom: 0; }
    .agenda-item { grid-template-columns: 52px 1fr auto; }
    .date-tile { width: 48px; height: 48px; display: grid; place-content: center; border-radius: 10px; background: var(--paper-2); text-align: center; }
    .date-tile strong { display: block; font-family: Georgia, serif; font-size: 17px; line-height: 1; }
    .date-tile span { display: block; margin-top: 2px; color: var(--muted); font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; }
    .item-copy strong { display: block; font-size: 12px; }
    .item-copy span { display: block; margin-top: 3px; color: var(--muted); font-size: 10px; }
    .status { width: fit-content; padding: 4px 8px; border-radius: 999px; display: inline-flex; align-items: center; gap: 5px; background: var(--paper-2); color: var(--muted); font-size: 9px; font-weight: 800; white-space: nowrap; }
    .status.new, .status.tentative { background: var(--blue-soft); color: var(--blue); }
    .status.contacted, .status.consultation, .status.editing { background: var(--gold-soft); color: #825b20; }
    .status.proposal, .status.review { background: var(--rose-soft); color: var(--rose); }
    .status.booked, .status.confirmed, .status.ready, .status.delivered, .status.paid { background: var(--sage-soft); color: var(--success); }
    .status.completed { background: #e9e7e2; color: #5e5b55; }
    .status.overdue { background: var(--danger-soft); color: var(--danger); }
    .attention-item { grid-template-columns: 35px 1fr auto; }
    .attention-icon { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; background: var(--copper-soft); color: var(--copper); }
    .attention-icon .icon { width: 16px; }
    .delivery-item { grid-template-columns: 40px 1fr auto; }
    .delivery-thumb { width: 40px; height: 40px; border-radius: 8px; overflow: hidden; background: linear-gradient(135deg,#68574c,#b28d72); }
    .delivery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .empty { min-height: 170px; padding: 30px; display: grid; place-items: center; text-align: center; color: var(--muted); }
    .empty-icon { width: 46px; height: 46px; margin: 0 auto 10px; border-radius: 50%; display: grid; place-items: center; background: var(--paper-2); color: var(--muted-2); }

    .toolbar { margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { min-height: 36px; padding: 6px 11px; border: 1px solid var(--line); border-radius: 9px; background: var(--paper); color: var(--muted); font-size: 11px; font-weight: 750; }
    .filter-btn.active { border-color: var(--ink); background: var(--ink); color: white; }
    .field-search { min-width: 230px; height: 38px; border: 1px solid var(--line); border-radius: 9px; padding: 0 11px; outline: none; background: var(--paper); }
    .field-search:focus { border-color: var(--copper); box-shadow: 0 0 0 3px rgba(165,82,55,.09); }

    .pipeline { display: grid; grid-template-columns: repeat(5, minmax(245px, 1fr)); gap: 12px; align-items: start; overflow-x: auto; padding: 2px 2px 18px; scroll-snap-type: x proximity; }
    .pipeline-col { min-height: 490px; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,253,249,.48); scroll-snap-align: start; }
    .pipeline-col.drag-over { border-color: var(--copper); background: var(--copper-soft); }
    .pipeline-head { padding: 13px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); }
    .pipeline-head strong { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; }
    .pipeline-head span { width: 22px; height: 22px; border-radius: 999px; display: grid; place-items: center; background: var(--paper); color: var(--muted); font-size: 10px; }
    .pipeline-body { min-height: 430px; padding: 9px; display: grid; align-content: start; gap: 9px; }
    .lead-card { width: 100%; padding: 13px; border: 1px solid var(--line); border-radius: 11px; background: var(--paper); box-shadow: 0 3px 12px rgba(35,28,20,.04); text-align: left; transition: transform .15s ease, box-shadow .15s ease; }
    .lead-card:hover { transform: translateY(-2px); box-shadow: 0 9px 24px rgba(35,28,20,.09); }
    .lead-card.dragging { opacity: .45; }
    .lead-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .lead-card h3 { font-family: Inter, sans-serif; font-size: 13px; font-weight: 800; letter-spacing: -.01em; }
    .lead-card .session-type { margin-top: 3px; color: var(--muted); font-size: 10px; }
    .budget-pill { padding: 3px 6px; border-radius: 6px; background: var(--paper-2); color: var(--muted); font-size: 9px; white-space: nowrap; }
    .lead-detail { margin-top: 13px; display: grid; gap: 6px; color: var(--muted); font-size: 10px; }
    .lead-detail span { display: flex; align-items: center; gap: 6px; }
    .lead-detail .icon { width: 12px; height: 12px; color: var(--copper); }
    .lead-foot { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .source { color: var(--muted-2); font-size: 9px; }
    .followup { font-size: 9px; font-weight: 750; color: var(--copper); }

    .calendar-shell { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
    .calendar-card { overflow: hidden; }
    .calendar-nav { min-height: 67px; padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line); }
    .month-control { display: flex; align-items: center; gap: 9px; }
    .month-control h2 { min-width: 170px; text-align: center; font-family: Inter, sans-serif; font-size: 15px; font-weight: 800; }
    .calendar-weekdays, .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }

    .form-section-title { grid-column: 1/-1; padding-top: 8px; border-top: 1px solid var(--line); }
    .form-section-title:first-child { border-top: 0; padding-top: 0; }
    .form-section-title strong { display: block; font-size: 11px; }
    .form-section-title span { display: block; margin-top: 2px; color: var(--muted); font-size: 9px; }
    .conflict-alert { grid-column: 1/-1; display: none; padding: 12px; border: 1px solid #e9b7ae; border-radius: 10px; background: var(--danger-soft); color: #7d302a; font-size: 10px; }
    .conflict-alert.show { display: block; }
    .conflict-alert strong, .conflict-alert span { display: block; }
    .conflict-alert span { margin-top: 3px; }
    .conflict-alert label { margin-top: 8px; display: flex; align-items: center; gap: 7px; font-weight: 750; }
    .conflict-alert input { accent-color: var(--danger); }

    .confirm-card { width: min(410px,100%); padding: 24px; border-radius: 16px; background: var(--paper); box-shadow: var(--shadow-lg); text-align: center; }
    .confirm-icon { width: 49px; height: 49px; margin: 0 auto 13px; border-radius: 50%; display: grid; place-items: center; background: var(--copper-soft); color: var(--copper); }
    .confirm-card h2 { font-size: 24px; }
    .confirm-card p { margin-top: 8px; color: var(--muted); }
    .confirm-actions { margin-top: 20px; display: flex; justify-content: center; gap: 8px; }

    .toast-region { position: fixed; z-index: 160; right: 18px; bottom: 18px; display: grid; gap: 8px; pointer-events: none; }
    .toast { width: min(360px,calc(100vw - 36px)); padding: 12px 13px; border-radius: 11px; display: grid; grid-template-columns: 27px 1fr; gap: 9px; align-items: center; background: var(--ink); color: white; box-shadow: var(--shadow-md); animation: toast-in .25s var(--ease); }
    .toast-icon { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; background: rgba(255,255,255,.12); color: #a5dbb8; }
    .toast-icon .icon { width: 14px; }
    .toast strong { display: block; font-size: 11px; }
    .toast span { display: block; margin-top: 2px; color: #c8c8c3; font-size: 9px; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(10px); } }

    .mobile-nav { display: none; }
    .mobile-scrim { display: none; }

    @media (max-width: 1220px) {
      .grid.cols-4 { grid-template-columns: repeat(2,1fr); }
      .dashboard-layout { grid-template-columns: 1fr; }
      .dashboard-side { grid-template-columns: 1fr 1fr; }
      .calendar-shell { grid-template-columns: 1fr; }
      .agenda-side { display: none; }
      .inquiry-admin { grid-template-columns: 1fr; }
    }
    @media (max-width: 980px) {
      :root { --sidebar: 224px; }
      .page { padding-inline: 22px; }
      .next-shoot { grid-template-columns: 1fr .72fr; }
      .client-layout { grid-template-columns: 250px 1fr; }
      .profile-columns { grid-template-columns: 1fr; }
    }
    @media (max-width: 840px) {
      :root { --ribbon-height: 44px; }
      body { padding-bottom: 66px; }
      body.public-mode { padding-bottom: 0; }
      .demo-ribbon { justify-content: flex-start; padding-left: 13px; }
      .demo-ribbon .demo-copy { display: none; }
      .ribbon-actions { right: 5px; }
      .ribbon-btn { min-width: 44px; min-height: 44px; justify-content: center; }
      .ribbon-btn span { display: none; }
      .sidebar { transform: translateX(-102%); width: min(286px,86vw); box-shadow: var(--shadow-lg); }
      body.nav-open .sidebar { transform: translateX(0); }
      .mobile-scrim { display: block; position: fixed; z-index: 45; inset: var(--ribbon-height) 0 0; background: rgba(22,20,18,.45); opacity: 0; pointer-events: none; transition: .2s; }
      body.ribbon-hidden .mobile-scrim { top: 0; }
      body.nav-open .mobile-scrim { opacity: 1; pointer-events: auto; }
      .workspace { margin-left: 0; min-height: 100vh; }
      .topbar { height: 65px; padding: 0 14px; gap: 9px; }
      .icon-btn.menu-btn { display: inline-grid; }
      .global-search { flex: 1; width: auto; }
      .global-search input { height: 40px; padding-right: 12px; font-size: 16px; }
      .search-results { position: fixed; top: calc(var(--ribbon-height) + 65px); left: 14px; right: 14px; width: auto; max-height: min(420px, calc(100vh - var(--ribbon-height) - 84px)); overflow-y: auto; }
      body.ribbon-hidden .search-results { top: 65px; }
      .key-hint { display: none; }
      .topbar-spacer { display: none; }
      .topbar-actions .preview-btn, .topbar-actions .has-dot { display: none; }
      .btn, .btn.small, .icon-btn, .filter-btn, .choice label, .back-studio { min-height: 44px; }
      .back-studio { padding-block: 10px; }
      .contact-line a { min-height: 44px; display: inline-flex; align-items: center; }
      .field input, .field select, .field textarea, .field-search, .client-list-search input { font-size: 16px; }
      .consent, .form-note { font-size: 11px; line-height: 1.45; }
      .page { padding: 23px 15px 34px; }
      .page-head { min-height: 0; margin-bottom: 19px; }
      .page-head h1 { font-size: 33px; }
      .page-head p { font-size: 12px; }
      .page-actions { align-self: flex-start; }
      .grid.cols-3 { grid-template-columns: 1fr; }
      .client-layout { grid-template-columns: 1fr; }
      .client-list { max-height: 310px; }
      .profile-hero { min-height: 150px; }
      .public-shell { grid-template-columns: 1fr; }
      .public-image { min-height: 380px; height: 46vh; position: relative; top: 0; }
      .public-image img { min-height: 380px; }
      .public-form-side { min-height: auto; padding: 29px 22px 45px; }
      .public-quote .display { font-size: 36px; }
      .public-topline { margin-bottom: 22px; }
      .priority-options { grid-template-columns: repeat(2,1fr); }
      .pipeline, .delivery-board { scroll-snap-type: x proximity; }
      .pipeline-col, .delivery-column { scroll-snap-align: start; }
      .settings-grid { grid-template-columns: 1fr; }
      .mobile-nav { position: fixed; z-index: 40; inset: auto 0 0; height: 66px; padding: 6px 7px max(6px,env(safe-area-inset-bottom)); display: grid; grid-template-columns: repeat(5,1fr); border-top: 1px solid var(--line); background: rgba(255,253,249,.95); backdrop-filter: blur(15px); }
      .mobile-nav button { border: 0; border-radius: 8px; display: grid; place-items: center; align-content: center; gap: 2px; background: transparent; color: var(--muted); font-size: 8px; font-weight: 750; }
      .mobile-nav button.active { color: var(--copper); background: var(--copper-soft); }
      .mobile-nav .icon { width: 18px; height: 18px; }
      .toast-region { bottom: 78px; }
      .drawer { inset: var(--ribbon-height) 0 66px; width: 100%; border-radius: 16px 16px 0 0; transform: translateY(102%); }
      .drawer.open { transform: translateY(0); }
    }
    @media (max-width: 680px) {
      .page-head { display: grid; }
      .page-actions { width: 100%; justify-content: flex-start; }
      .grid.cols-4, .grid.cols-2 { grid-template-columns: 1fr 1fr; }
      .metric-card { min-height: 108px; padding: 14px; }
      .metric-value { font-size: 25px; }
      .metric-note { font-size: 9px; }
      .next-shoot { grid-template-columns: 1fr; }
      .next-photo { min-height: 215px; order: -1; }
      .next-copy { padding: 19px; }
      .dashboard-side { grid-template-columns: 1fr; }
      .agenda-item { grid-template-columns: 45px 1fr; }
      .agenda-item > .status { display: none; }
      .calendar-weekdays, .calendar-grid { display: none; }
      .calendar-agenda { display: grid; }
      .calendar-nav { min-height: 58px; }
      .calendar-nav > .light-chip { display: none; }
      .month-control h2 { min-width: 145px; }
      .profile-hero { display: grid; }
      .profile-hero .btn { width: fit-content; }
      .profile-stats { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .field.full, .priority-group, .consent, .form-section-title, .conflict-alert { grid-column: 1; }
      .detail-grid { grid-template-columns: 1fr 1fr; }
      .modal-scrim { padding: 0; align-items: end; }
      .modal { width: 100%; max-height: 92svh; border-radius: 18px 18px 0 0; }
      .public-image { min-height: 330px; height: 42vh; }
      .public-image img { min-height: 330px; }
      .public-brand { left: 20px; top: 20px; }
      .public-quote { left: 20px; right: 20px; bottom: 22px; }
      .public-quote p { display: none; }
    }
    @media (max-width: 430px) {
      .grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .grid.cols-2 { grid-template-columns: 1fr; }
      .metric-card { min-height: 102px; }
      .metric-note { display: block; }
      .topbar-actions .add-btn { width: 42px; padding: 0; }
      .topbar-actions .add-btn span { display: none; }
      .profile-stats { grid-template-columns: 1fr; }
      .profile-body { padding: 16px; }
      .priority-options { grid-template-columns: 1fr 1fr; }
      .inquiry-form .form-title { font-size: 36px; }
      .form-actions { align-items: stretch; }
      .form-actions .btn { flex: 1; }
      .detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 430px) and (max-height: 650px) {
      .public-image, .public-image img { min-height: 255px; height: 255px; }
      .public-form-side { padding-top: 23px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }

        leads,

        tasks: Array.isArray(data.tasks) ? data.tasks : seed.tasks,
        activity: Array.isArray(data.activity) ? data.activity : seed.activity
      };
    }

    function updateStorageMode(persisted) {
      document.body.classList.toggle('storage-warning', !persisted);
      const title = $('.demo-state strong');
      const copy = $('.demo-copy');
      if (title) title.textContent = persisted ? 'Interactive demo' : 'Tab-only mode';
      if (copy) copy.textContent = persisted ? 'Your changes save on this device.' : 'Storage is unavailable—export before closing.';
    }

    async function persist(message, detail = '') {
      const saved = await Store.save(state.data);
      updateStorageMode(saved);
      updateCounts();
      if (message) toast(saved ? message : 'Saved for this tab only', saved ? detail : 'Browser storage is unavailable. Export now if you need to keep these changes.');
      return saved;
    }

    function pageHead(eyebrow, title, description, actions = '') {
      return `<div class="page-head"><div><span class="eyebrow">${esc(eyebrow)}</span><h1>${esc(title)}</h1><p>${esc(description)}</p></div><div class="page-actions">${actions}</div></div>`;
    }

    function statusBadge(value) {
      return `<span class="status ${slugClass(value)}">${esc(value)}</span>`;
    }

    function renderMetric(label, value, note, iconName) {
      return `<article class="card metric-card"><div class="metric-top"><span class="metric-label">${esc(label)}</span><span class="metric-icon">${ico(iconName)}</span></div><strong class="metric-value">${esc(value)}</strong><p class="metric-note">${note}</p></article>`;
    }

    function renderDashboard() {
      const today = localIso(new Date());
      const monthKey = today.slice(0, 7);
      const newLeads = state.data.leads.filter((lead) => lead.status === 'New' && lead.createdAt >= addDays(-6)).length;
      const monthSessions = state.data.sessions.filter((session) => session.date.startsWith(monthKey) && session.status !== 'Cancelled').length;
      const bookedRevenue = state.data.sessions.filter((session) => session.date.startsWith(monthKey) && isCommittedSession(session)).reduce((sum, session) => sum + Number(session.totalFee || 0), 0);
      const deliveryDue = state.data.sessions.filter((session) => isDeliverableSession(session) && session.deliveryDue && session.deliveryStatus !== 'Delivered' && session.deliveryDue <= addDays(14)).length;
      const allUpcoming = state.data.sessions.filter((session) => !sessionHasEnded(session) && !['Cancelled', 'Completed'].includes(session.status)).sort((a, b) => `${a.date}${a.startTime}`.localeCompare(`${b.date}${b.startTime}`));
      const upcoming = allUpcoming.slice(0, 4);
      const allNeedsReply = state.data.leads.filter((lead) => !['Booked', 'Closed'].includes(lead.status)).sort((a, b) => String(a.followUpAt || '').localeCompare(String(b.followUpAt || '')));
      const needsReply = allNeedsReply.slice(0, 4);
      const next = nextSession();
      const nextClient = next ? sessionClient(next) : null;
      const score = readinessScore(next);
      const readinessLabels = { questionnaire: 'Questionnaire', retainer: 'Retainer', contract: 'Contract', location: 'Location', shotList: 'Shot list', confirmation: 'Confirmation' };
      const activeDeliveryQueue = state.data.sessions.filter((session) => isDeliverableSession(session) && ['Editing', 'Review'].includes(session.deliveryStatus)).sort((a, b) => String(a.deliveryDue || '9999-12-31').localeCompare(String(b.deliveryDue || '9999-12-31')));
      const activeDeliveries = activeDeliveryQueue.slice(0, 3);

      return `<section class="page">
        ${pageHead('Studio command center', `Good ${greeting()}, ${(state.data.settings.ownerName || 'Photographer').split(/\s+/)[0]}.`, 'Here is what is moving through the studio today.', `
          <button class="btn secondary" type="button" data-action="new-client">${ico('users')}Add client</button>
          <button class="btn copper" type="button" data-action="new-session">${ico('plus')}Schedule session</button>`)}
        <div class="grid cols-4">
          ${renderMetric('New inquiries', newLeads, `<strong>${newLeads ? 'Reply today' : 'Inbox clear'}</strong> · 7-day total`, 'inbox')}
          ${renderMetric('Sessions this month', monthSessions, `<strong>${allUpcoming.length} upcoming</strong>`, 'calendar')}
          ${renderMetric('Booked revenue', money(bookedRevenue), '<strong>This month</strong> · booked value', 'dollar')}
          ${renderMetric('Deliveries due', deliveryDue, `<strong>${activeDeliveryQueue.length} editing</strong> · next 14 days`, 'image')}
        </div>
        <div class="grid dashboard-layout">
          <div class="dashboard-main">
            ${next ? `<article class="card next-shoot">
              <div class="next-copy">
                <span class="eyebrow">Next on camera · ${esc(relativeDate(next.date))}</span>
                <h2>${esc(next.title)}</h2>
                <p>${esc(next.packageName)} for ${esc(nextClient?.name || 'Client')}</p>
                <div class="shoot-meta">
                  <span class="meta-line">${ico('calendar')} ${esc(shortDate(next.date))} · ${esc(formatTime(next.startTime))} · ${esc(next.duration)} min</span>
                  <span class="meta-line">${ico('map')} ${esc(next.location)}</span>
                </div>
                <span class="light-chip">${ico('sun')} Ideal light ${esc(lightWindow(next))} <small>sample</small></span>
                <div class="readiness"><div class="readiness-head"><strong>Shoot readiness</strong><span>${score}% ready</span></div><div class="progress"><span style="width:${score}%"></span></div><div class="check-row">${Object.entries(next.readiness || {}).map(([key, done]) => `<span class="check-chip ${done ? 'done' : ''}">${done ? '✓ ' : ''}${esc(readinessLabels[key] || titleCase(key))}</span>`).join('')}</div></div>
                <div class="next-actions"><button class="btn small" type="button" data-session="${attr(next.id)}">Open shoot brief ${ico('arrow-right')}</button><button class="btn small secondary" type="button" data-action="edit-session" data-id="${attr(next.id)}">${ico('edit')}Edit</button></div>
              </div>
              <div class="next-photo"><img src="assets/daylight-hero.png" alt="Newlywed couple walking through a prairie at dusk" width="1672" height="941"><div class="photo-caption"><span>Visual reference</span><strong>Honest movement · soft dusk</strong></div></div>
            </article>` : `<article class="card empty"><div><span class="empty-icon">${ico('calendar')}</span><strong>No upcoming sessions</strong><p>Schedule the next story when you are ready.</p></div></article>`}
            <article class="card">
              <div class="card-head"><div><h2>Coming up</h2><p>The next sessions on your calendar</p></div><button class="btn small ghost" type="button" data-view="calendar">Full calendar ${ico('arrow-right')}</button></div>
              <div class="agenda-list">${upcoming.map(renderAgendaItem).join('') || renderEmptyInline('No upcoming sessions.')}</div>
            </article>
          </div>
          <div class="dashboard-side">
            <article class="card">
              <div class="card-head"><div><h2>Needs a reply</h2><p>Follow-ups that keep bookings moving</p></div><span class="status overdue">${allNeedsReply.length} open</span></div>
              <div class="attention-list">${needsReply.map((lead) => `<div class="attention-item"><span class="attention-icon">${ico(lead.status === 'New' ? 'sparkles' : 'mail')}</span><span class="item-copy"><strong>${esc(lead.name)}</strong><span>${esc(lead.sessionType)} · ${esc(relativeDate(lead.followUpAt))}</span></span><button class="btn small secondary" type="button" data-lead="${attr(lead.id)}">Open</button></div>`).join('') || renderEmptyInline('No follow-ups waiting.')}</div>
            </article>
            <article class="card">
              <div class="card-head"><div><h2>In the edit</h2><p>Active galleries and delivery deadlines</p></div><button class="btn small ghost" type="button" data-view="deliveries">View all ${ico('arrow-right')}</button></div>
              <div class="delivery-list">${activeDeliveries.map((session) => `<div class="delivery-item"><span class="delivery-thumb"><img src="assets/daylight-hero.png" alt="" width="1672" height="941"></span><span class="item-copy"><strong>${esc(session.title)}</strong><span>${esc(session.deliveryProgress)}% · due ${esc(shortDate(session.deliveryDue))}</span></span>${statusBadge(session.deliveryStatus)}</div>`).join('') || renderEmptyInline('No galleries are actively editing.')}</div>
            </article>
          </div>
        </div>
      </section>`;
    }

    function renderAgendaItem(session) {
      const date = parseDate(session.date);
      return `<button class="agenda-item" type="button" data-session="${attr(session.id)}" style="width:100%;border-left:0;border-right:0;border-top:0;background:transparent;text-align:left;color:inherit"><span class="date-tile"><strong>${date.getDate()}</strong><span>${formatDate(session.date, { month: 'short' })}</span></span><span class="item-copy"><strong>${esc(session.title)}</strong><span>${esc(formatTime(session.startTime))} · ${esc(session.location)}</span></span>${statusBadge(session.status)}</button>`;
    }

    function renderEmptyInline(message) {
      return `<div class="empty" style="min-height:120px"><div><span class="empty-icon">${ico('check')}</span><p>${esc(message)}</p></div></div>`;
    }

    function greeting() {
      const hour = new Date().getHours();
      return hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening';
    }

    function renderLeads() {
      const query = state.leadQuery.trim().toLowerCase();
      const leads = state.data.leads.filter((lead) => !query || [lead.name, lead.email, lead.sessionType, lead.location, lead.source].some((value) => String(value || '').toLowerCase().includes(query)));
      return `<section class="page">
        ${pageHead('Inquiry pipeline', 'Turn interest into stories.', 'Every potential client, follow-up, and next step in one visual pipeline.', `
          <button class="btn secondary" type="button" data-action="copy-public">${ico('copy')}Copy inquiry link</button>
          <button class="btn copper" type="button" data-action="new-lead">${ico('plus')}Add inquiry</button>`)}
        <div class="toolbar"><div class="filters"><button class="filter-btn active" type="button">Active pipeline</button><button class="filter-btn" type="button" data-action="show-closed">Closed ${state.data.leads.filter((lead) => lead.status === 'Closed').length}</button></div><input class="field-search" id="leadSearch" type="search" value="${attr(state.leadQuery)}" placeholder="Filter inquiries…" aria-label="Filter inquiries"></div>
        <div class="pipeline" aria-label="Inquiry status pipeline">
          ${LEAD_COLUMNS.map((status) => {
            const column = leads.filter((lead) => lead.status === status);
            return `<section class="pipeline-col" data-drop-status="${attr(status)}"><header class="pipeline-head"><strong>${esc(status === 'Proposal' ? 'Proposal sent' : status)}</strong><span>${column.length}</span></header><div class="pipeline-body">${column.map(renderLeadCard).join('') || `<div class="empty" style="min-height:120px;padding:15px"><p>Drop an inquiry here</p></div>`}</div></section>`;
          }).join('')}
        </div>
      </section>`;
    }

    function renderLeadCard(lead) {
      return `<button class="lead-card" type="button" data-lead="${attr(lead.id)}" draggable="true">
        <span class="lead-card-top"><span><h3>${esc(lead.name)}</h3><span class="session-type">${esc(lead.sessionType)}</span></span><span class="budget-pill">${esc(lead.budget)}</span></span>
        <span class="lead-detail"><span>${ico('calendar')} ${esc(relativeDate(lead.preferredDate))}</span><span>${ico('map')} ${esc(lead.location || 'Location TBD')}</span></span>
        <span class="lead-foot"><span class="source">via ${esc(lead.source || 'Direct')}</span><span class="followup">Follow up ${esc(relativeDate(lead.followUpAt).toLowerCase())}</span></span>
      </button>`;
    }

    function renderCalendar() {
      const cursor = state.calendarCursor;
      const year = cursor.getFullYear();
      const month = cursor.getMonth();
      const first = new Date(year, month, 1, 12);
      const gridStart = new Date(first);
      gridStart.setDate(first.getDate() - first.getDay());
      const monthLabel = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(first);
      const today = localIso(new Date());
      const monthSessions = state.data.sessions
        .filter((session) => session.date.slice(0, 7) === localIso(first).slice(0, 7) && (state.calendarFilter === 'All' || session.status === state.calendarFilter))
        .sort((a, b) => `${a.date}${a.startTime}`.localeCompare(`${b.date}${b.startTime}`));
      const days = Array.from({ length: 42 }, (_, index) => {
        const date = new Date(gridStart);
        date.setDate(gridStart.getDate() + index);
        const iso = localIso(date);
        const events = state.data.sessions.filter((session) => session.date === iso && (state.calendarFilter === 'All' || session.status === state.calendarFilter)).sort((a, b) => a.startTime.localeCompare(b.startTime));
        return `<div class="calendar-day ${date.getMonth() !== month ? 'outside' : ''} ${iso === today ? 'today' : ''}"><span class="day-number">${date.getDate()}</span><div class="day-events">${events.slice(0, 3).map((session) => `<button class="cal-event ${slugClass(session.sessionType)} ${slugClass(session.status)}" type="button" data-session="${attr(session.id)}" title="${attr(session.title)} · ${attr(formatTime(session.startTime))}">${esc(formatTime(session.startTime).replace(' ', ''))} ${esc(sessionClient(session)?.name?.split(' ')[0] || session.title)}</button>`).join('')}${events.length > 3 ? `<button class="cal-more" type="button" data-action="show-day-sessions" data-date="${attr(iso)}" aria-label="Show all ${events.length} sessions on ${attr(shortDate(iso))}">+${events.length - 3} more</button>` : ''}</div></div>`;
      }).join('');

      return `<section class="page">
        ${pageHead('Studio calendar', 'Plan around the light.', 'Sessions, consultations, deadlines, and the details that make a shoot feel effortless.', `<button class="btn copper" type="button" data-action="new-session">${ico('plus')}Schedule session</button>`)}
        <div class="toolbar"><div class="filters" aria-label="Filter calendar by status">${['All', 'Tentative', 'Confirmed', 'Completed'].map((filter) => `<button class="filter-btn ${state.calendarFilter === filter ? 'active' : ''}" type="button" data-action="calendar-filter" data-filter="${attr(filter)}" aria-pressed="${state.calendarFilter === filter}">${esc(filter)}</button>`).join('')}</div><button class="btn small secondary" type="button" data-action="calendar-today">Today</button></div>
        <div class="calendar-shell">
          <article class="card calendar-card">
            <div class="calendar-nav"><div class="month-control"><button class="icon-btn" type="button" data-action="calendar-prev" aria-label="Previous month">${ico('chevron-left')}</button><h2 aria-live="polite">${esc(monthLabel)}</h2><button class="icon-btn" type="button" data-action="calendar-next" aria-label="Next month">${ico('chevron-right')}</button></div><span class="light-chip">${ico('sun')} Light windows are sample guidance</span></div>
            <div class="calendar-weekdays">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map((day) => `<div class="weekday">${day}</div>`).join('')}</div>
            <div class="calendar-grid">${days}</div>
            <div class="calendar-agenda">${monthSessions.map(renderAgendaItem).join('') || renderEmptyInline('No sessions this month.')}</div>
          </article>
          <aside class="card agenda-side"><div class="card-head"><div><h2>Month agenda</h2><p>${plural(monthSessions.length, 'session')} shown</p></div></div>${monthSessions.slice(0, 8).map((session) => `<div class="upcoming-session"><button type="button" data-session="${attr(session.id)}"><span class="mini-date">${esc(shortDate(session.date))} · ${esc(formatTime(session.startTime))}</span><h3>${esc(session.title)}</h3><p>${esc(session.location)} · ${esc(session.duration)} min</p>${['Family','Engagement','Wedding','Portrait'].includes(session.sessionType) && session.location !== 'Video consultation' ? `<span class="light-chip">${ico('sun')} ${esc(lightWindow(session))}</span>` : ''}</button></div>`).join('') || renderEmptyInline('No sessions this month.')}</aside>
        </div>
      </section>`;
    }

    function renderClients() {
      const query = state.clientQuery.trim().toLowerCase();
      const clients = state.data.clients.filter((client) => !query || [client.name, client.email, client.phone, ...(client.tags || [])].some((value) => String(value || '').toLowerCase().includes(query)));
      if (!state.selectedClientId || !clients.some((client) => client.id === state.selectedClientId)) state.selectedClientId = clients[0]?.id || null;
      const selected = clients.find((client) => client.id === state.selectedClientId) || null;
      return `<section class="page">
        ${pageHead('Client library', 'People, not records.', 'A composed view of every relationship, session history, preference, and thoughtful detail.', `<button class="btn copper" type="button" data-action="new-client">${ico('plus')}Add client</button>`)}
        <div class="client-layout">
          <article class="card client-list-card"><div class="client-list-search"><input id="clientSearch" type="search" value="${attr(state.clientQuery)}" placeholder="Search clients…" aria-label="Search clients"></div><div class="client-list">${clients.map((client) => `<button class="client-row ${client.id === state.selectedClientId ? 'active' : ''}" type="button" data-client-select="${attr(client.id)}" ${client.id === state.selectedClientId ? 'aria-current="true"' : ''}><span class="client-avatar">${esc(initials(client.name))}</span><span><strong>${esc(client.name)}</strong><span>${plural(clientSessions(client.id).length, 'session')} · ${esc(client.preferredContact)}</span></span>${ico('chevron-right')}</button>`).join('') || renderEmptyInline('No clients match that search.')}</div></article>
          ${selected ? renderClientProfile(selected) : `<article class="card">${renderEmptyInline('Select a client to view their story.')}</article>`}
        </div>
      </section>`;
    }

    function renderClientProfile(client) {
      const sessions = clientSessions(client.id);
      const upcoming = sessions.filter((session) => !sessionHasEnded(session) && !['Cancelled', 'Completed'].includes(session.status)).sort((a, b) => `${a.date}${a.startTime}`.localeCompare(`${b.date}${b.startTime}`));
      const value = sessions.filter(isCommittedSession).reduce((sum, session) => sum + Number(session.totalFee || 0), 0);
      return `<article class="card client-profile">
        <div class="profile-hero"><div class="profile-identity"><span class="client-avatar">${esc(initials(client.name))}</span><span><h2>${esc(client.name)}</h2><p>Client since ${esc(formatDate(client.createdAt, { month: 'long', year: 'numeric' }))} · referred by ${esc(client.referralSource || 'Direct')}</p></span></div><button class="btn small secondary" type="button" data-action="edit-client" data-id="${attr(client.id)}">${ico('edit')}Edit client</button></div>
        <div class="profile-body">
          <div class="profile-stats"><div class="profile-stat"><span>Booked value</span><strong>${esc(money(value))}</strong></div><div class="profile-stat"><span>Sessions</span><strong>${sessions.length}</strong></div><div class="profile-stat"><span>Next story</span><strong style="font-size:14px">${esc(upcoming[0] ? relativeDate(upcoming[0].date) : 'Nothing booked')}</strong></div></div>
          <div class="profile-columns">
            <div><p class="section-label">Contact & preferences</p><div class="contact-stack"><span class="contact-line">${ico('mail')}<a href="mailto:${attr(client.email)}">${esc(client.email)}</a></span><span class="contact-line">${ico('phone')}${client.phone ? `<a href="tel:${attr(client.phone.replace(/[^0-9+]/g,''))}">${esc(client.phone)}</a>` : '<span>Phone not provided</span>'}</span><span class="contact-line">${ico('send')}Prefers ${esc(client.preferredContact)}</span></div><div class="tags">${(client.tags || []).map((tag) => `<span class="tag">${esc(tag)}</span>`).join('')}</div><div class="note-box">${esc(client.notes || 'No client notes yet.')}</div><div class="next-actions"><button class="btn small" type="button" data-action="new-session" data-client-id="${attr(client.id)}">${ico('calendar')}Schedule</button><button class="btn small secondary" type="button" data-action="copy-contact" data-id="${attr(client.id)}">${ico('copy')}Copy contact</button></div></div>
            <div><p class="section-label">Session history</p><div class="timeline">${sessions.map((session) => `<button class="timeline-item" type="button" data-session="${attr(session.id)}" style="border-top:0;border-right:0;border-bottom:0;background:transparent;text-align:left;color:inherit"><strong>${esc(session.title)}</strong><span>${esc(shortDate(session.date))} · ${esc(session.packageName)} · ${esc(session.status)}</span></button>`).join('') || '<p class="subtle">No sessions yet.</p>'}</div></div>
          </div>
        </div>
      </article>`;
    }

    function renderDeliveries() {
      const deliverable = state.data.sessions.filter(isDeliverableSession);
      const overdue = deliverable.filter((session) => session.deliveryStatus !== 'Delivered' && session.deliveryDue && session.deliveryDue < localIso(new Date())).length;
      return `<section class="page">
        ${pageHead('Gallery delivery', 'The work after the shutter.', 'Track every gallery from cull to color, review, and client delivery without losing the deadline.', `<button class="btn secondary" type="button" data-action="export-deliveries">${ico('download')}Export queue</button>`)}
        <div class="toolbar"><div class="filters"><span class="status editing">${deliverable.filter((session) => session.deliveryStatus === 'Editing').length} editing</span><span class="status review">${deliverable.filter((session) => session.deliveryStatus === 'Review').length} in review</span>${overdue ? `<span class="status overdue">${overdue} overdue</span>` : '<span class="status booked">On track</span>'}</div></div>
        <div class="delivery-board">${DELIVERY_STAGES.map((stage) => {
          const items = deliverable.filter((session) => (session.deliveryStatus || 'Not started') === stage).sort((a, b) => String(a.deliveryDue).localeCompare(String(b.deliveryDue)));
          return `<section class="delivery-column"><header class="delivery-column-head"><strong>${esc(stage)}</strong><span>${items.length}</span></header><div class="delivery-column-body">${items.map(renderDeliveryCard).join('') || `<div class="empty" style="min-height:100px;padding:14px"><p>No galleries here</p></div>`}</div></section>`;
        }).join('')}</div>
      </section>`;
    }

    function renderDeliveryCard(session) {
      const isOverdue = session.deliveryDue && session.deliveryDue < localIso(new Date()) && session.deliveryStatus !== 'Delivered';
      const nextIndex = Math.min(DELIVERY_STAGES.indexOf(session.deliveryStatus || 'Not started') + 1, DELIVERY_STAGES.length - 1);
      const nextStage = DELIVERY_STAGES[nextIndex];
      const shootHasHappened = sessionHasEnded(session);
      const canAdvance = session.deliveryStatus !== 'Delivered' && shootHasHappened && (nextStage !== 'Delivered' || session.status === 'Completed');
      const blockedLabel = !shootHasHappened ? 'Available after shoot' : nextStage === 'Delivered' && session.status !== 'Completed' ? 'Complete shoot first' : '';
      return `<article class="delivery-card"><div class="delivery-cover"><img src="assets/daylight-hero.png" alt="" width="1672" height="941" style="object-position:${session.sessionType === 'Brand' ? '25%' : '70%'} center"><span>${esc(session.sessionType)} · ${esc(shortDate(session.date))}</span></div><div class="delivery-card-body"><h3>${esc(session.title)}</h3><p>${isOverdue ? 'Overdue ' : session.deliveryStatus === 'Delivered' ? 'Delivered' : 'Due '} ${esc(relativeDate(session.deliveryDue))}</p><div class="delivery-progress"><span>Gallery progress</span><strong>${esc(session.deliveryProgress || 0)}%</strong></div><div class="progress"><span style="width:${Number(session.deliveryProgress || 0)}%"></span></div><div class="delivery-actions"><button class="btn small secondary" type="button" data-session="${attr(session.id)}">Details</button>${canAdvance ? `<button class="btn small" type="button" data-action="advance-delivery" data-id="${attr(session.id)}">Move to ${esc(nextStage)}</button>` : blockedLabel ? `<span class="status">${esc(blockedLabel)}</span>` : ''}</div></div></article>`;
    }

    function getPublicUrl() {
      const url = new URL(location.href);
      url.hash = '';
      url.searchParams.set('public', 'inquiry');
      return url.href;
    }

    function renderInquiryAdmin() {
      return `<section class="page">
        ${pageHead('Client experience', 'An inquiry form that feels like you.', 'A thoughtful first impression that gathers the creative details you actually need.', `<button class="btn copper" type="button" data-action="open-public">${ico('external')}Open client view</button>`)}
        <div class="inquiry-admin">

<button class="btn danger" type="button" data-action="reset">${ico('refresh')}Reset to sample data</button></div><div class="data-note"><strong>Production path</strong><br>These records map cleanly to Clients, Inquiries, Sessions, Tasks, and Settings tables for a future database or Google Sheets backend.</div></aside></div>

    function inputField(name, label, value = '', type = 'text', required = false, placeholder = '', extra = '') {

    }

    function selectField(name, label, options, selectedValue = '', required = false) {

        const value = typeof option === 'string' ? option : option.value;

      }).join('')}</select></div>`;
    }

    function syncPublicDraft(form = $('#publicInquiryForm')) {

        if (!element.name) continue;
        if (element.name === 'coveragePriority') continue;

    function timeMinutes(value) {
      const [hours, minutes] = String(value || '00:00').split(':').map(Number);
      return hours * 60 + minutes;
    }

    function localDateTimeMs(date, time) {
      if (!date || !time) return NaN;
      const [year, month, day] = date.split('-').map(Number);
      const [hours, minutes] = time.split(':').map(Number);
      return new Date(year, month - 1, day, hours, minutes).getTime();
    }

    function sessionHasEnded(session) {
      const start = localDateTimeMs(session.date, session.startTime);
      return Number.isFinite(start) && start + Number(session.duration || 0) * 60000 <= Date.now();
    }

    function getSessionConflicts(form) {
      if (!form) return [];
      const id = form.elements.id.value;
      const date = form.elements.date.value;
      const start = localDateTimeMs(date, form.elements.startTime.value);
      const duration = Number(form.elements.duration.value || 0);
      const status = form.elements.status.value;
      if (!date || !Number.isFinite(start) || !duration || status === 'Cancelled') return [];
      const end = start + duration * 60000;
      return state.data.sessions.filter((session) => {
        if (session.id === id || session.status === 'Cancelled') return false;
        const otherStart = localDateTimeMs(session.date, session.startTime);
        const otherEnd = otherStart + Number(session.duration || 0) * 60000;
        return start < otherEnd && end > otherStart;
      });
    }

    function validateSessionRules(form, shouldReport = true) {
      const date = form.elements.date;
      const status = form.elements.status;
      const deliveryDue = form.elements.deliveryDue;
      const deliveryStatus = form.elements.deliveryStatus;
      const draftSession = { date: date.value, startTime: form.elements.startTime.value, duration: Number(form.elements.duration.value || 0) };
      status.setCustomValidity(status.value === 'Completed' && !sessionHasEnded(draftSession) ? 'A session cannot be marked completed before its scheduled end time.' : '');
      if (status.value === 'Cancelled' && deliveryStatus.value !== 'Not started') deliveryStatus.setCustomValidity('A cancelled session cannot have an active delivery.');
      else if (['Editing', 'Review'].includes(deliveryStatus.value) && !sessionHasEnded(draftSession)) deliveryStatus.setCustomValidity('Delivery work cannot begin before the shoot has ended.');
      else if (deliveryStatus.value === 'Delivered' && status.value !== 'Completed') deliveryStatus.setCustomValidity('Mark the session completed before marking its gallery delivered.');
      else deliveryStatus.setCustomValidity('');
      if (deliveryDue) {
        deliveryDue.min = date.value || '';
        const needsDueDate = ['Editing', 'Review'].includes(deliveryStatus.value);
        if (needsDueDate && !deliveryDue.value) deliveryDue.setCustomValidity('Add a gallery due date for an active delivery.');
        else if (deliveryDue.value && date.value && deliveryDue.value < date.value) deliveryDue.setCustomValidity('Gallery due date cannot be before the session.');
        else deliveryDue.setCustomValidity('');
      }
      return shouldReport ? form.reportValidity() : form.checkValidity();
    }

    function updateConflictAlert() {
      const form = $('#sessionForm');
      const alert = $('#conflictAlert');
      if (!form || !alert) return;
      const conflicts = getSessionConflicts(form);
      alert.classList.toggle('show', conflicts.length > 0);
      const text = $('#conflictText');
      if (text) text.textContent = conflicts.length ? `This overlaps ${conflicts.map((session) => `${session.title} (${shortDate(session.date)} at ${formatTime(session.startTime)})`).join(', ')}.` : '';
      if (!conflicts.length && form.elements.allowConflict) form.elements.allowConflict.checked = false;
    }

    async function saveSessionForm(form) {
      validateBusinessForm(form, false);
      validateSessionRules(form, false);
      if (!form.reportValidity()) return;
      const conflicts = getSessionConflicts(form);
      if (conflicts.length && !form.elements.allowConflict.checked) {
        updateConflictAlert();
        $('#conflictAlert')?.scrollIntoView({ block: 'center', behavior: 'smooth' });
        toast('Choose how to handle the overlap', 'Review the conflict, then change the time or allow it explicitly.');
        return;
      }
      const values = Object.fromEntries(new FormData(form));
      const existing = state.data.sessions.find((session) => session.id === values.id);
      const previousStatus = existing?.status || null;
      const lead = values.leadId ? state.data.leads.find((item) => item.id === values.leadId) : null;
      const duplicateLeadSession = lead && !existing ? state.data.sessions.find((session) => session.leadId === lead.id && isActiveBookingSession(session)) : null;
      if (duplicateLeadSession) {
        toast('This inquiry already has a booking', 'Edit the linked session instead of creating a second one.');
        return;
      }
      let clientId = values.clientId;
      let createdClient = null;
      if (clientId === '__from_lead__' && lead) {
        const matched = state.data.clients.find((client) => client.email.toLowerCase() === lead.email.toLowerCase());
        if (matched) clientId = matched.id;
        else {
          createdClient = {
            id: makeId('client'), name: lead.name, email: lead.email, phone: lead.phone || '', preferredContact: lead.preferredContact || 'Email',
            tags: [lead.sessionType, 'New booking'], referralSource: lead.source || 'Inquiry form', notes: [lead.shootGoal || lead.vision || '', lead.planningNotes || ''].filter(Boolean).join('\n\n'), createdAt: localIso(new Date()), lastContactAt: localIso(new Date())
          };
          state.data.clients.unshift(createdClient);
          clientId = createdClient.id;
        }
      }
      const stageProgress = { 'Not started': 0, Editing: 45, Review: 90, Delivered: 100 };
      const readiness = {
        questionnaire: existing?.readiness?.questionnaire ?? Boolean(lead?.shootGoal || lead?.vision),
        retainer: ['Paid', 'Not required'].includes(values.depositStatus),
        contract: existing?.readiness?.contract || false,
        location: Boolean(values.location.trim()),
        shotList: Boolean(values.shotNotes.trim()),
        confirmation: ['Confirmed', 'Completed'].includes(values.status)
      };
      const record = {
        ...(existing || {}), id: existing?.id || makeId('session'), clientId, leadId: values.leadId || existing?.leadId || null,
        title: values.title.trim(), sessionType: values.sessionType, date: values.date, startTime: values.startTime, duration: Number(values.duration),
        location: values.location.trim(), status: values.status, packageName: values.packageName.trim(), totalFee: Number(values.totalFee || 0),
        depositStatus: values.depositStatus, creativeBrief: values.creativeBrief.trim(), shotNotes: values.shotNotes.trim(),
        deliveryDue: values.deliveryDue || null, deliveryStatus: values.deliveryStatus,
        deliveryProgress: existing && existing.deliveryStatus === values.deliveryStatus ? existing.deliveryProgress : stageProgress[values.deliveryStatus],
        readiness
      };
      if (existing) Object.assign(existing, record); else state.data.sessions.unshift(record);
      if (lead) {
        if (!existing) {
          lead.clientId = clientId;
          lead.status = record.status === 'Cancelled' ? 'Proposal' : 'Booked';
          lead.followUpAt = addDays(14);
          if (record.status !== 'Cancelled') completeRelatedTasks('Lead', lead.id);
        } else if (previousStatus !== 'Cancelled' && record.status === 'Cancelled') {
          const hasOtherBooking = state.data.sessions.some((session) => session.id !== record.id && session.leadId === lead.id && isActiveBookingSession(session));
          if (!hasOtherBooking && lead.status !== 'Closed') lead.status = 'Proposal';
        } else if (previousStatus === 'Cancelled' && record.status !== 'Cancelled' && lead.status !== 'Closed') {
          lead.clientId = clientId;
          lead.status = 'Booked';
        }
      }
      if (record.status === 'Completed') completeRelatedTasks('Session', record.id);
      if (record.deliveryStatus === 'Delivered') completeRelatedTasks('Delivery', record.id);
      state.data.activity.unshift({ id: makeId('activity'), at: new Date().toISOString(), text: `${record.title} was ${existing ? 'updated' : 'scheduled'}.` });
      closeModal();
      closeDrawer();
      if (lead && !existing) state.view = 'calendar';
      await persist(lead && !existing ? 'Inquiry converted to a booking' : existing ? 'Session updated' : 'Session scheduled', createdClient ? `${createdClient.name} is now a client and the session is on the calendar.` : `${record.title} is on ${shortDate(record.date)}.`);
      render();
      if (lead && !existing) setTimeout(() => openSessionDrawer(record.id), 120);
    }

    async function saveSettingsForm(form) {
      if (!validateBusinessForm(form)) return;
      const values = Object.fromEntries(new FormData(form));

      }
      form.elements.sessionTypes.setCustomValidity('');
      state.data.settings = {
        ...state.data.settings,

        location: values.location.trim(), workingHours: values.workingHours.trim(), defaultDuration: Number(values.defaultDuration),

      };

    function updateOverlayState() {
      const modalOpen = $('#modalRoot')?.classList.contains('open');
      const drawerOpen = $('#drawer')?.classList.contains('open');

    function focusableElements(root) {
      return root ? $$('button:not([disabled]), [href], input:not([disabled]):not([type="hidden"]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])', root)
        .filter((element) => element.getClientRects().length && getComputedStyle(element).visibility !== 'hidden') : [];

    function updateCounts() {
      if (!state.data) return;
      const today = localIso(new Date());
      const counts = {
        leads: state.data.leads.filter((lead) => lead.status === 'New').length,
        sessions: state.data.sessions.filter((session) => session.date >= today && !['Cancelled', 'Completed'].includes(session.status)).length,

    function switchView(view) {

      closeDrawer();
      closeModal();
      state.view = view;
      render();

    async function copyText(text, successMessage = 'Copied to clipboard') {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement('textarea');
        area.value = text;
        area.style.position = 'fixed';
        area.style.opacity = '0';
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      toast(successMessage, 'Ready to paste wherever you need it.');
    }

    function downloadFile(name, content, type = 'application/json') {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(new Blob([content], { type }));
      link.download = name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }

    function csvCell(value) {
      const raw = String(value ?? '');
      const safe = /^[=+\-@]/.test(raw.trimStart()) ? `'${raw}` : raw;
      return `"${safe.replace(/"/g, '""')}"`;
    }

    function toast(title, detail = '') {

      region.appendChild(element);
      setTimeout(() => { element.style.opacity = '0'; element.style.transform = 'translateY(8px)'; }, 3400);

    function showGlobalResults(query) {

        ...state.data.leads.filter((item) => [item.name, item.sessionType, item.location].some((value) => String(value).toLowerCase().includes(term))).map((item) => ({ type: 'lead', id: item.id, title: item.name, meta: `${item.sessionType} inquiry · ${item.status}`, icon: 'inbox' })),
        ...state.data.sessions.filter((item) => [item.title, item.sessionType, item.location].some((value) => String(value).toLowerCase().includes(term))).map((item) => ({ type: 'session', id: item.id, title: item.title, meta: `${shortDate(item.date)} · ${item.location}`, icon: 'calendar' }))

        if (approved) { await Store.reset(); state.data = createSeedData(); state.publicDraft = {}; state.publicStep = 1; state.publicSuccess = false; state.selectedClientId = state.data.clients[0].id; const saved = await Store.save(state.data); updateStorageMode(saved); render(); toast(saved ? 'Demo reset' : 'Demo reset for this tab only', saved ? 'The original sample studio is back.' : 'Browser storage is unavailable, so this reset will not survive a reload.'); }
