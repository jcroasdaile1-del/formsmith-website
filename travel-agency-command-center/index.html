    function resolveDocumentSource(clientId, sourceRecordId) {
      const client = state.clients.find(function(item) { return item.id === clientId; }) || state.clients[0];
      if (!client) return { client: null, trip: null, type: '' };
      const parts = String(sourceRecordId || '').split(':');
      const type = parts[0];
      const id = parts.slice(1).join(':');
      if (type === 'trip') {
        const trip = state.trips.find(function(item) { return item.id === id; });
        if (trip) {
          return {
            client: state.clients.find(function(item) { return item.id === trip.clientId; }) || client,
            trip: trip,
            type: 'Booked Trip'
          };
        }
      }
      if (type === 'lead') {
        const lead = state.leads.find(function(item) { return item.id === id && item.clientId === client.id; });
        if (lead) return { client: client, trip: tripFromLead(lead, client), type: 'Lead / Trip Request' };
      }
      const firstTrip = state.trips.find(function(item) { return item.clientId === client.id; });
      if (firstTrip && type !== 'client') return { client: client, trip: firstTrip, type: 'Booked Trip' };
      const firstLead = state.leads.find(function(item) { return item.clientId === client.id; });
      if (firstLead && type !== 'client') return { client: client, trip: tripFromLead(firstLead, client), type: 'Lead / Trip Request' };
      return { client: client, trip: tripFromClient(client), type: 'Client Profile' };
    }

    function tripFromLead(lead, client) {
      return {
        id: 'lead:' + lead.id,
        clientId: client.id,
        clientName: client.firstName + ' ' + client.lastName,
        destination: lead.destination || 'Trip request',
        tripType: lead.tripType || 'Trip Request',
        travelStartDate: lead.travelStartDate || todayIso(),
        travelEndDate: lead.travelEndDate || lead.travelStartDate || todayIso(),
        supplier: 'Supplier to confirm',
        bookingNumber: 'Not booked yet',
        totalPrice: Number(String(lead.budget || '').replace(/[^0-9.]/g, '')) || 0,
        depositPaid: 0,
        finalPaymentAmount: 0,
        finalPaymentDueDate: '',
        reservationStatus: lead.status || 'Lead',
        insuranceOffered: true,
        insuranceStatus: lead.insuranceInterested || 'Pending',
        documentsSent: 'No',
        internalNotes: lead.notes || lead.mustHaves || '',
        groupCruiseId: ''
      };
    }

    function tripFromClient(client) {
      return {
        id: 'client:' + client.id,
        clientId: client.id,
        clientName: client.firstName + ' ' + client.lastName,
        destination: 'Client profile',
        tripType: 'Client Profile',
        travelStartDate: '',
        travelEndDate: '',
        supplier: 'Not booked yet',

        finalPaymentAmount: 0,
        finalPaymentDueDate: '',
        reservationStatus: 'Not booked',
        insuranceOffered: false,
        insuranceStatus: 'Not recorded',
        documentsSent: 'No',
        internalNotes: client.notes || '',
        groupCruiseId: ''
      };
    }

    function mergeTemplate(templateBody, data) {
      return templateBody.replace(/{{\s*([A-Za-z0-9]+)\s*}}/g, function(match, key) {
        return escapeHtml(data[key] == null ? '' : data[key]);
      });
    }

    function getTemplateBody(template) {
      const bodies = getDefaultTemplateBodies();
      return bodies[template.templateType] || bodies.Intake;
    }

    function getTemplatePlaceholders(template) {
      const matches = getTemplateBody(template).match(/{{\s*[A-Za-z0-9]+\s*}}/g) || [];
      return Array.from(new Set(matches.map(function(item) { return item.replace(/[{}]/g, '').trim(); }))).sort();
    }

    function updateDocumentStatus(documentId, status) {
      const doc = state.documents.find(function(item) { return item.id === documentId; });
      if (!doc) return;
      doc.status = status;
      saveState();
      closeModal();
      render();
      toast('Document marked ' + status + '.');
    }

    function markAlertPaid(kind, id) {
      const collection = kind === 'payment' ? state.payments : state.groupDeposits;
      const alert = collection.find(function(item) { return item.id === id; });
      if (!alert) return;
      alert.status = 'Paid';
      saveState();
      render();
      toast('Alert marked paid.');
    }

    function getFilteredAlerts() {
      return getAllAlerts().filter(function(alert) {
        if (alertFilter === 'All') return true;
        if (alertFilter === 'Client Reservation Payments') return alert.kind === 'payment';
        if (alertFilter === 'Group Cruise Deposits') return alert.kind === 'groupDeposit';
        if (alertFilter === 'Agent-Specific Group Deposits') return alert.kind === 'groupDeposit' && alert.appliesTo === 'Agent';
        if (alertFilter === 'Due Soon') return alert.status === 'Due Soon';
        if (alertFilter === 'Overdue') return alert.status === 'Overdue';
        if (alertFilter === 'Paid') return alert.status === 'Paid';
        return true;
      }).sort(sortByDueDate);
    }

    function getAllAlerts() {
      const clientWindow = Number(state.settings.clientPaymentReminderWindowDays || 14);
      const groupWindow = Number(state.settings.groupCruiseDepositReminderWindowDays || 21);
      const payments = state.payments.map(function(payment) {
        return {
          kind: 'payment',
          id: payment.id,
          title: payment.clientName + ' - ' + payment.tripNameDestination + ' ' + payment.paymentType,
          dueDate: payment.dueDate,
          amountDue: payment.amountDue,
          status: computedPaymentStatus(payment.dueDate, payment.status, clientWindow),
          appliesTo: 'Client Reservation',
          visualType: 'client',
          notes: payment.notes
        };
      });
      const deposits = state.groupDeposits.map(function(deposit) {
        return {
          kind: 'groupDeposit',
          id: deposit.id,
          title: deposit.cruiseName + ' - ' + deposit.depositType,
          dueDate: deposit.dueDate,
          amountDue: deposit.amountDue,
          status: computedPaymentStatus(deposit.dueDate, deposit.status, groupWindow),
          appliesTo: deposit.appliesTo,
          visualType: deposit.appliesTo === 'Agent' ? 'agent' : deposit.appliesTo === 'Group Hold' ? 'group' : 'client',
          notes: deposit.notes
        };
      });
      return payments.concat(deposits);
    }

    function computedPaymentStatus(dueDate, storedStatus, windowDays) {
      if (storedStatus === 'Paid') return 'Paid';
      if (compareIso(dueDate, todayIso()) < 0) return 'Overdue';
      if (compareIso(dueDate, addDays(Number(windowDays || 14))) <= 0) return 'Due Soon';
      return storedStatus || 'Upcoming';
    }

    function paymentContextBadge(alert) {
      if (alert.kind === 'payment') return '<span class="badge brand">Client reservation</span>';
      if (alert.appliesTo === 'Agent') return '<span class="badge coral">Agent-specific group deposit</span>';
      if (alert.appliesTo === 'Group Hold') return '<span class="badge purple">Group space / cabin hold</span>';
      return '<span class="badge brand">Client within group cruise</span>';
    }

    function tripStatusBadges(trip) {
      const badges = [statusBadge(trip.reservationStatus)];
      const paymentStatus = computedPaymentStatus(trip.finalPaymentDueDate, trip.finalPaymentAmount <= 0 ? 'Paid' : 'Upcoming', state.settings.clientPaymentReminderWindowDays);
      if (paymentStatus === 'Due Soon') badges.push('<span class="badge warn">Payment Due Soon</span>');
      if (paymentStatus === 'Overdue') badges.push('<span class="badge danger">Overdue</span>');
      if (trip.documentsSent !== 'Yes') badges.push('<span class="badge purple">Documents Needed</span>');
      if (compareIso(trip.travelStartDate, todayIso()) >= 0 && compareIso(trip.travelStartDate, addDays(21)) <= 0) badges.push('<span class="badge good">Traveling Soon</span>');
      if (compareIso(trip.travelEndDate, todayIso()) < 0) badges.push('<span class="badge neutral">Completed</span>');
      return badges;
    }

    function renderAlertRows(alerts) {
      if (!alerts.length) return emptyState('No alerts due today or overdue.');
      return alerts.map(function(alert) {
        return '<div class="item-row"><div><p class="item-title">' + escapeHtml(alert.title) + '</p><div class="item-meta"><span>' + formatDate(alert.dueDate) + '</span><span>' + formatMoney(alert.amountDue) + '</span><span>' + escapeHtml(alert.appliesTo) + '</span></div></div>' + statusBadge(alert.status) + '</div>';
      }).join('');
    }

    function renderPaymentRows(payments) {
      if (!payments.length) return emptyState('No client reservation payment alerts.');
      return payments.map(function(payment) {
        const status = computedPaymentStatus(payment.dueDate, payment.status, state.settings.clientPaymentReminderWindowDays);
        return '<div class="item-row"><div><p class="item-title">' + escapeHtml(payment.clientName + ' - ' + payment.tripNameDestination) + '</p><div class="item-meta"><span>' + escapeHtml(payment.paymentType) + '</span><span>' + formatMoney(payment.amountDue) + '</span><span>Due ' + formatDate(payment.dueDate) + '</span></div></div>' + statusBadge(status) + '</div>';
      }).join('');
    }

    function renderGroupDepositRows(deposits) {
      if (!deposits.length) return emptyState('No group cruise deposit alerts.');
      return deposits.map(function(deposit) {
        const status = computedPaymentStatus(deposit.dueDate, deposit.status, state.settings.groupCruiseDepositReminderWindowDays);
        return '<div class="item-row"><div><p class="item-title">' + escapeHtml(deposit.depositType) + '</p><div class="item-meta"><span>' + escapeHtml(deposit.appliesTo) + '</span><span>' + formatMoney(deposit.amountDue) + '</span><span>Due ' + formatDate(deposit.dueDate) + '</span></div></div>' + statusBadge(status) + '</div>';
      }).join('');
    }

    function renderTripRows(trips) {
      if (!trips.length) return emptyState('No trips to show.');
      return trips.map(function(trip) {
        return '<div class="item-row"><div><p class="item-title">' + escapeHtml(trip.destination) + '</p><div class="item-meta"><span>' + escapeHtml(trip.clientName) + '</span><span>' + formatDate(trip.travelStartDate) + ' - ' + formatDate(trip.travelEndDate) + '</span><span>' + escapeHtml(trip.supplier) + '</span></div></div>' + tripStatusBadges(trip).slice(0, 2).join(' ') + '</div>';
      }).join('');
    }

    function renderLeadRows(leads) {
      if (!leads.length) return emptyState('No leads to show.');
      return leads.map(function(lead) {
        return '<div class="item-row"><div><p class="item-title">' + escapeHtml(lead.destination) + '</p><div class="item-meta"><span>' + escapeHtml(lead.clientName) + '</span><span>' + escapeHtml(lead.tripType) + '</span><span>Follow-up ' + formatDate(lead.followUpDate) + '</span></div></div>' + statusBadge(lead.status) + '</div>';
      }).join('');
    }

    function renderQuoteMiniRows(quotes) {
      return quotes.map(function(quote) {
        return '<div class="item-row"><div><p class="item-title">' + escapeHtml(quote.id) + '</p><div class="item-meta"><span>Expires ' + formatDate(quote.expirationDate) + '</span><span>' + escapeHtml(quote.notes) + '</span></div></div>' + statusBadge(quote.quoteStatus) + '</div>';
      }).join('');
    }

    function renderDocumentRows(documents) {
      return documents.map(function(doc) {
        return '<div class="item-row"><div><p class="item-title">' + escapeHtml(doc.documentName) + '</p><div class="item-meta"><span>' + escapeHtml(doc.documentType) + '</span><span>' + formatDate(doc.createdDate) + '</span></div></div>' + statusBadge(doc.status) + '</div>';
      }).join('');

    function statusBadge(status) {
      const text = status || 'Unknown';
      const lower = text.toLowerCase();
      let tone = 'neutral';
      if (['booked', 'paid', 'accepted', 'active', 'generated', 'sent', 'signed/completed'].includes(lower)) tone = 'good';
      if (['due soon', 'researching', 'quote sent', 'waiting on client', 'pending', 'pending client', 'needed'].includes(lower)) tone = 'warn';
      if (['overdue', 'lost', 'declined', 'expired'].includes(lower)) tone = 'danger';
      if (['agent', 'documents needed'].includes(lower)) tone = 'coral';
      if (['group hold', 'hold active', 'draft'].includes(lower)) tone = 'purple';
      if (['new', 'upcoming'].includes(lower)) tone = 'brand';
      return '<span class="badge ' + tone + '">' + escapeHtml(text) + '</span>';
    }

          toast('Public form link copied.');
        }).catch(function() {
          fallbackCopyText(url);
        });
        return;
      }
      fallbackCopyText(url);

    function fallbackCopyText(value) {

        toast('Public form link copied.');

    function deleteClient(id) {
      const client = state.clients.find(function(c) { return c.id === id; });
      if (!client) return;
      const linkedLeads = state.leads.filter(function(l) { return l.clientId === id; }).map(function(l) { return l.id; });
      const linkedQuotes = state.quotes.filter(function(q) { return q.clientId === id; }).map(function(q) { return q.id; });
      const linkedTrips = state.trips.filter(function(t) { return t.clientId === id; }).length;
      const msg = 'Delete client ' + client.firstName + ' ' + client.lastName + '?\n\nThis will also remove:\n- ' + linkedLeads.length + ' lead(s)\n- ' + linkedQuotes.length + ' quote(s)\n- ' + linkedTrips + ' trip(s)\n- All linked travelers, payments, and documents.';
      if (!confirm(msg)) return;
      state.clients = state.clients.filter(function(c) { return c.id !== id; });
      state.leads = state.leads.filter(function(l) { return l.clientId !== id; });
      state.quotes = state.quotes.filter(function(q) { return q.clientId !== id; });
      state.quoteOptions = state.quoteOptions.filter(function(o) { return linkedQuotes.indexOf(o.quoteId) === -1; });
      state.trips = state.trips.filter(function(t) { return t.clientId !== id; });
      state.payments = state.payments.filter(function(p) { return p.clientId !== id; });
      state.travelers = state.travelers.filter(function(tr) { return tr.clientId !== id; });
      state.documents = state.documents.filter(function(d) { return d.clientId !== id; });
      if (selectedClientId === id) selectedClientId = state.clients[0] ? state.clients[0].id : '';
      saveState();
      render();
      toast('Client and linked records deleted.');
    }

    function deleteLead(id) {
      const lead = state.leads.find(function(l) { return l.id === id; });
      if (!lead) return;
      const linkedQuotes = state.quotes.filter(function(q) { return q.leadId === id; }).map(function(q) { return q.id; });
      if (!confirm('Delete lead "' + lead.destination + '" for ' + lead.clientName + '?\n\nThis will also remove ' + linkedQuotes.length + ' linked quote(s).')) return;
      state.leads = state.leads.filter(function(l) { return l.id !== id; });
      state.quotes = state.quotes.filter(function(q) { return q.leadId !== id; });
      state.quoteOptions = state.quoteOptions.filter(function(o) { return linkedQuotes.indexOf(o.quoteId) === -1; });
      saveState();
      render();
      toast('Lead deleted.');
    }

    function deleteQuote(id) {
      const quote = state.quotes.find(function(q) { return q.id === id; });
      if (!quote) return;
      if (!confirm('Delete quote for ' + quote.clientName + '?')) return;
      state.quotes = state.quotes.filter(function(q) { return q.id !== id; });

      saveState();
      render();
      toast('Quote deleted.');

    function selected(value, option) {
      return String(value || '') === String(option || '') ? 'selected' : '';
    }

    function byStatus(status) {
      return function(item) { return item.status === status || item.quoteStatus === status; };
    }

    function sortByDueDate(a, b) {
      return compareIso(a.dueDate, b.dueDate);
    }

    function todayIso() {
      return toIso(new Date());
    }

    function addDays(days) {
      const date = new Date();
      date.setHours(0, 0, 0, 0);
      date.setDate(date.getDate() + Number(days || 0));
      return toIso(date);
    }

    function toIso(date) {
      const copy = new Date(date);
      copy.setHours(0, 0, 0, 0);
      const year = copy.getFullYear();
      const month = String(copy.getMonth() + 1).padStart(2, '0');
      const day = String(copy.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function formatDate(iso) {
      if (!iso) return 'Not set';
      const parts = String(iso).split('-').map(Number);
      if (parts.length !== 3 || parts.some(isNaN)) return iso;
      return new Date(parts[0], parts[1] - 1, parts[2]).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function compareIso(a, b) {
      return String(a || '').localeCompare(String(b || ''));
    }

    function daysBetween(startIso, endIso) {
      if (!startIso || !endIso) return 0;
      const start = new Date(startIso + 'T00:00:00');
      const end = new Date(endIso + 'T00:00:00');
      return Math.max(0, Math.round((end - start) / 86400000));
    }

    function getActivitySummary(lead, trip, client) {
      const source = [lead.tripType, lead.mustHaves, trip.destination, client.travelPreferences].join(' ').toLowerCase();
      const activities = [];
      if (/disney|family|history|europe|portugal|river/.test(source)) activities.push('Sightseeing/History');
      if (/europe|portugal|culinary|wine|food|river/.test(source)) activities.push('Culture/Arts', 'Wine/Culinary');
      if (/beach|cancun|jamaica|caribbean|all-inclusive|ocean|resort/.test(source)) activities.push('Beach/Sun');
      if (/excursion|active|sports|alaska|adventure/.test(source)) activities.push('Active/Sports');
      if (/shopping/.test(source)) activities.push('Shopping');
      if (/spa|anniversary|honeymoon/.test(source)) activities.push('Spa');
      return Array.from(new Set(activities)).join(', ') || 'To be confirmed';
    }

      return String(value || 'travel-document').trim().replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '').slice(0, 80) || 'travel-document';

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
