<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://getformsmith.com/projects/travel-agency-manager.html">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <title>Crosby Travel Adventures Command Center Demo</title>
  <meta name="description" content="Front-end-only travel agency management demo for clients, trips, payments, group cruises, and documents.">
  <style>
    /*
      Dark mode uses the published Catppuccin Mocha palette:
      base #11111b, mantle #181825, crust #11111b, surface0 #313244,
      text #cdd6f4, subtext0 #a6adc8, sky #89dceb, teal #94e2d5,
      green #a6e3a1, yellow #f9e2af, mauve #cba6f7, red #f38ba8.
      Source: https://catppuccin.com/palette/
    */
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f9fbfd;
      --ink: #16202f;
      --muted: #647187;
      --line: #dbe2ec;
      --brand: #19647e;
      --brand-dark: #12465c;
      --brand-soft: #e5f3f6;
      --button-primary: #0b57d0;
      --button-primary-hover: #0842a0;
      --button-primary-text: #ffffff;
      --button-primary-shadow: rgba(11, 87, 208, .2);
      --button-secondary-bg: #e8f0fe;
      --button-secondary-hover: #d2e3fc;
      --button-secondary-text: #0b57d0;
      --button-secondary-border: #c2d7ff;
      --button-danger: #b3261e;
      --button-danger-hover: #8c1d18;
      --button-danger-text: #ffffff;
      --button-success: #137333;
      --button-success-hover: #0d652d;
      --button-success-text: #ffffff;
      --coral: #c45546;
      --coral-soft: #fdebe7;
      --gold: #a96f16;
      --gold-soft: #fff4d8;
      --green: #2c7a58;
      --green-soft: #e6f5ee;
      --violet: #6854a6;
      --violet-soft: #efecfb;
      --red: #b63333;
      --red-soft: #feecec;
      --shadow: 0 16px 42px rgba(26, 39, 59, .12);
      --shadow-soft: 0 8px 24px rgba(26, 39, 59, .08);
      --radius: 8px;
      --sidebar: 270px;
      --sidebar-mini: 76px;
      --topbar: 76px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    input, select, textarea, button, .card, .panel, .table-shell { min-width: 0; }
    a { color: inherit; }
    h1, h2, h3, p { margin-top: 0; }

    .nav-scrim {
      position: fixed;
      inset: 0;
      z-index: 35;
      background: rgba(15, 26, 38, .38);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 40;
      width: var(--sidebar);
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px 12px;
      background: rgba(255, 255, 255, .98);
      border-right: 1px solid var(--line);
      box-shadow: 10px 0 28px rgba(28, 41, 61, .08);
      transition: width .22s ease, transform .22s ease;
    }

    .sidebar-toggle {
      position: fixed;
      z-index: 45;
      top: 22px;
      left: calc(var(--sidebar) - 18px);
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid #bfd7df;
      color: #fff;
      background: var(--brand);
      box-shadow: var(--shadow-soft);
      display: grid;
      place-items: center;
      transition: left .22s ease, background .16s ease, transform .16s ease;
    }

    .sidebar-toggle:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .brand {
      min-height: 52px;
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 2px 4px 8px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #28927d);
      box-shadow: inset 0 -10px 18px rgba(0, 0, 0, .16);
    }

    .brand-copy strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .brand-copy span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .nav-list {
      display: grid;
      gap: 4px;
      overflow-y: auto;
      padding: 2px 0;
    }

    .nav-item {
      width: 100%;
      border: 0;
      border-radius: var(--radius);
      padding: 11px 12px;
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 11px;
      color: var(--muted);
      background: transparent;
      text-align: left;
      font-weight: 700;
      transition: background .18s ease, color .18s ease, transform .18s ease;
    }

    .nav-item:hover {
      background: var(--panel-soft);
      color: var(--brand-dark);
    }

    .nav-item.active {
      background: var(--brand-soft);
      color: var(--brand-dark);
      box-shadow: inset 3px 0 0 var(--brand);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--muted);
      font-size: 12px;
    }

    .sidebar-footer strong {
      display: block;
      color: var(--ink);
      margin-bottom: 3px;
      font-size: 13px;
    }

    body.nav-collapsed .sidebar { width: var(--sidebar-mini); }
    body.nav-collapsed .sidebar-toggle { left: calc(var(--sidebar-mini) - 18px); }
    body.nav-collapsed .brand {
      grid-template-columns: 44px;
      justify-content: center;
    }
    body.nav-collapsed .brand-copy,
    body.nav-collapsed .sidebar-footer,
    body.nav-collapsed .nav-label {
      display: none;
    }
    body.nav-collapsed .nav-item {
      grid-template-columns: 1fr;
      justify-items: center;
      padding: 12px 8px;
    }
    body.nav-collapsed .nav-item.active {
      box-shadow: inset 0 -3px 0 var(--brand);
    }

    .app-shell {
      min-height: 100vh;
      margin-left: var(--sidebar);
      transition: margin-left .22s ease;
    }

    body.nav-collapsed .app-shell { margin-left: var(--sidebar-mini); }

    body.public-mode .sidebar,
    body.public-mode .sidebar-toggle,
    body.public-mode .nav-scrim {
      display: none;
    }

    body.public-mode .app-shell,
    body.public-mode.nav-collapsed .app-shell {
      margin-left: 0;
    }

    body.public-mode .topbar {
      grid-template-columns: minmax(0, 1fr);
    }

    body.public-mode .topbar-actions {
      display: none;
    }

    body.public-mode .content {
      max-width: 1120px;
    }

    .theme-toggle {
      color: var(--button-secondary-text);
      background: var(--button-secondary-bg);
      border-color: var(--button-secondary-border);
      box-shadow: none;
    }

    body.dark-mode {
      --bg: #11111b;
      --panel: #1e1e2e;
      --panel-soft: #181825;
      --ink: #cdd6f4;
      --muted: #a6adc8;
      --line: #313244;
      --brand: #89dceb;
      --brand-dark: #94e2d5;
      --brand-soft: #1e2f3a;
      --coral: #f38ba8;
      --coral-soft: #3a202d;
      --gold: #f9e2af;
      --gold-soft: #332d1f;
      --green: #a6e3a1;
      --green-soft: #203521;
      --violet: #cba6f7;
      --violet-soft: #2e2544;
      --red: #f38ba8;
      --red-soft: #3a2028;
      --button-primary: #89dceb;
      --button-primary-hover: #94e2d5;
      --button-primary-text: #11111b;
      --button-primary-shadow: rgba(137, 220, 235, .2);
      --button-secondary-bg: #313244;
      --button-secondary-hover: #45475a;
      --button-secondary-text: #89dceb;
      --button-secondary-border: #45475a;
      --button-danger: #f38ba8;
      --button-danger-hover: #eba0ac;
      --button-danger-text: #11111b;
      --button-success: #a6e3a1;
      --button-success-hover: #94e2d5;
      --button-success-text: #11111b;
      --shadow: 0 18px 46px rgba(0, 0, 0, .45);
      --shadow-soft: 0 10px 28px rgba(0, 0, 0, .32);
    }

    body.dark-mode .topbar {
      background: rgba(17, 17, 27, .92);
      border-bottom-color: #313244;
    }

    body.dark-mode .sidebar {
      background: rgba(30, 30, 46, .98);
      box-shadow: 10px 0 30px rgba(0, 0, 0, .36);
    }

    body.dark-mode input,
    body.dark-mode select,
    body.dark-mode textarea {
      color: var(--ink);
      background: #181825;
      border-color: #45475a;
    }

    body.dark-mode input[type="date"] {
      color-scheme: dark;
    }

    body.dark-mode input::placeholder,
    body.dark-mode textarea::placeholder {
      color: #6c7086;
      opacity: 1;
    }

    body.dark-mode .modal-layer {
      background: rgba(17, 17, 27, .72);
    }

    body.dark-mode .modal {
      color: var(--ink);
      background: var(--panel);
      border-color: #45475a;
    }

    body.dark-mode .modal-head,
    body.dark-mode .modal-body,
    body.dark-mode .modal-actions {
      background: var(--panel);
      border-color: #45475a;
    }

    body.dark-mode .modal-head h2,
    body.dark-mode .form-section-heading h3 {
      color: var(--ink);
    }

    body.dark-mode .field label,
    body.dark-mode .form-section-heading p {
      color: var(--muted);
    }

    body.dark-mode .date-picker-btn {
      color: var(--brand);
      background: #181825;
      border-color: #45475a;
      box-shadow: none;
    }

    body.dark-mode .date-picker-btn:hover {
      color: #11111b;
      background: var(--brand);
      border-color: var(--brand);
    }

    body.dark-mode .settings-note {
      color: var(--gold);
      background: var(--gold-soft);
      border-color: #45475a;
    }

    body.dark-mode .modal-body {
      scrollbar-color: #6c7086 #181825;
    }

    body.dark-mode .modal-body::-webkit-scrollbar {
      width: 10px;
    }

    body.dark-mode .modal-body::-webkit-scrollbar-track {
      background: #181825;
    }

    body.dark-mode .modal-body::-webkit-scrollbar-thumb {
      background: #6c7086;
      border-radius: 999px;
      border: 2px solid #181825;
    }

    body.dark-mode .quote-preview {
      color: var(--ink);
      background: var(--panel);
      border-color: #45475a;
    }

    body.dark-mode .quote-preview-body {
      background: var(--panel);
    }

    body.dark-mode .quote-preview .option-card {
      background: var(--panel-soft);
      border-color: #45475a;
    }

    body.dark-mode .nav-item:hover,
    body.dark-mode .btn.secondary:hover,
    body.dark-mode .icon-btn.secondary:hover,
    body.dark-mode .chip:hover {
      background: var(--button-secondary-hover);
      color: var(--button-secondary-text);
      border-color: var(--button-secondary-border);
    }

    body.dark-mode .table-shell,
    body.dark-mode .lead-card,
    body.dark-mode .template-card,
    body.dark-mode .document-card,
    body.dark-mode .alert-card,
    body.dark-mode .option-card,
    body.dark-mode .client-card {
      background: var(--panel);
    }

    body.dark-mode th {
      background: #181825;
    }

    body.dark-mode .pipeline-column {
      background: #181825;
    }

    body.dark-mode .document-preview {
      background: #181825;
    }

    body.dark-mode .document-page {
      background: #f8fafc;
      color: #1d2736;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 25;
      min-height: var(--topbar);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      background: rgba(245, 247, 251, .92);
      border-bottom: 1px solid rgba(219, 226, 236, .86);
      backdrop-filter: blur(12px);
    }

    .page-title span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .page-title h1 {
      margin: 3px 0 0;
      color: var(--ink);
      font-size: clamp(20px, 3vw, 26px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .content {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px;
    }

    .section-grid {
      display: grid;
      gap: 18px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.auto { grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); }

    .panel,
    .card,
    .kpi-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
    }

    .panel {
      padding: 18px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0;
      color: var(--ink);
      font-size: 17px;
      line-height: 1.25;
    }

    .panel-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
    }

    .kpi-card {
      appearance: none;
      width: 100%;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto auto 1fr;
      align-content: start;
      justify-items: stretch;
      gap: 10px;
      min-height: 118px;
      border-top: 3px solid var(--brand);
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .kpi-card:hover,
    .kpi-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      outline: none;
    }

    .kpi-card:focus-visible {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(25, 100, 126, .18), var(--shadow);
    }

    .kpi-card.warn { border-top-color: var(--gold); }
    .kpi-card.danger { border-top-color: var(--red); }
    .kpi-card.good { border-top-color: var(--green); }
    .kpi-card.purple { border-top-color: var(--violet); }
    .kpi-card.coral { border-top-color: var(--coral); }

    .kpi-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .kpi-top span {
      flex: 1 1 auto;
      min-width: 90px;
      max-width: calc(100% - 28px);
      overflow-wrap: normal;
      word-break: normal;
      hyphens: none;
    }

    .kpi-top .icon {
      flex: 0 0 16px;
    }

    .kpi-value {
      color: var(--ink);
      font-size: 29px;
      font-weight: 850;
      line-height: 1;
    }

    .kpi-note {
      color: var(--muted);
      font-size: 12px;
    }

    .card {
      padding: 15px;
      min-width: 0;
    }

    .item-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 13px 0;
      border-top: 1px solid var(--line);
    }

    .item-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .item-row:last-child { padding-bottom: 0; }

    .item-title {
      margin: 0 0 3px;
      color: var(--ink);
      font-weight: 820;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .item-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px 12px;
    }

    .muted { color: var(--muted); }
    .small { font-size: 13px; }
    .strong { font-weight: 800; }

    .empty-state {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      background: var(--panel-soft);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      width: fit-content;
      max-width: 100%;
      min-height: 25px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.2;
      white-space: normal;
    }

    .badge.brand { color: var(--brand-dark); background: var(--brand-soft); border-color: #c9e5eb; }
    .badge.good { color: var(--green); background: var(--green-soft); border-color: #c7eadb; }
    .badge.warn { color: var(--gold); background: var(--gold-soft); border-color: #f0dca4; }
    .badge.danger { color: var(--red); background: var(--red-soft); border-color: #f2c8c8; }
    .badge.coral { color: var(--coral); background: var(--coral-soft); border-color: #f5cec6; }
    .badge.purple { color: var(--violet); background: var(--violet-soft); border-color: #d9d0f6; }
    .badge.neutral { color: var(--muted); background: #f0f3f7; border-color: var(--line); }

    .button-row,
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .btn,
    .icon-btn,
    .chip {
      border: 1px solid transparent;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 39px;
      padding: 9px 12px;
      color: var(--button-primary-text);
      background: var(--button-primary);
      font-weight: 800;
      line-height: 1.1;
      text-decoration: none;
      box-shadow: 0 5px 15px var(--button-primary-shadow);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .btn:hover,
    .icon-btn:hover {
      background: var(--button-primary-hover);
      box-shadow: 0 8px 18px var(--button-primary-shadow);
      transform: translateY(-1px);
    }

    .btn.secondary,
    .icon-btn.secondary,
    .chip {
      color: var(--button-secondary-text);
      background: var(--button-secondary-bg);
      border-color: var(--button-secondary-border);
      box-shadow: none;
    }

    .btn.secondary:hover,
    .icon-btn.secondary:hover,
    .chip:hover {
      color: var(--button-secondary-text);
      background: var(--button-secondary-hover);
      border-color: var(--button-secondary-border);
    }

    .btn.danger {
      color: var(--button-danger-text);
      background: var(--button-danger);
      box-shadow: 0 5px 15px rgba(179, 38, 30, .16);
    }

    .btn.danger:hover {
      background: var(--button-danger-hover);
    }

    .btn.success {
      color: var(--button-success-text);
      background: var(--button-success);
      box-shadow: 0 5px 15px rgba(44, 122, 88, .16);
    }

    .btn.success:hover {
      background: var(--button-success-hover);
    }

    .btn.small,
    .chip {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .chip.active {
      color: var(--button-primary-text);
      background: var(--button-primary);
      border-color: var(--button-primary);
      box-shadow: 0 4px 12px var(--button-primary-shadow);
    }

    .icon-btn {
      width: 42px;
      padding: 0;
      flex: 0 0 auto;
    }

    .icon {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .icon.sm {
      width: 16px;
      height: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #c8d1dd;
      border-radius: var(--radius);
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border .16s ease, box-shadow .16s ease;
    }

    input[type="date"] {
      color-scheme: light;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(25, 100, 126, .14);
    }

    .date-input-row {
      display: grid;

      gap: 8px;

      min-height: 42px;

      background: var(--panel-soft);
      padding: 9px 10px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 750;
      cursor: pointer;

      background: var(--panel);

      gap: 8px;

      border-color: #a9d5df;
      background: var(--brand-soft);
      box-shadow: inset 3px 0 0 var(--brand);

    .client-card h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      overflow-wrap: anywhere;

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;

      background: var(--panel-soft);
      padding: 11px;

      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;

      display: block;
      margin-top: 5px;
      color: var(--ink);
      overflow-wrap: anywhere;
    }

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
      gap: 12px;
      align-items: start;

    .pipeline-column {
      min-width: 0;
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #eef3f7;

    .pipeline-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 850;

    .lead-card {
      display: grid;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(235px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .option-card {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--panel-soft);

    .option-thumb {
      min-height: 92px;
      border-radius: var(--radius);

      background:

        repeating-linear-gradient(45deg, rgba(255,255,255,.16), rgba(255,255,255,.16) 8px, transparent 8px, transparent 18px);

      place-items: center;
      color: #fff;
      font-weight: 850;
      text-align: center;
      padding: 12px;

    .alert-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      padding: 14px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--brand);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow-soft);

    .alert-card.agent { border-left-color: var(--coral); }
    .alert-card.group { border-left-color: var(--violet); }

      margin-top: 12px;

    .deadline-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;

    .document-grid {

      gap: 13px;

    .template-card,

      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;

    }

    .table-shell {
      width: 100%;
      overflow: visible;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

      table-layout: fixed;
    }

      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(17, 29, 43, .46);
    }

    .modal {

      max-height: min(86vh, 880px);

      background: var(--panel);

      box-shadow: var(--shadow);

      background: var(--panel);

    .document-preview {

      border-radius: var(--radius);

    .document-page {

      margin-bottom: 18px;
    }

    .document-page p { margin: 0 0 10px; }
    .document-page ul { margin: 8px 0 14px 20px; padding: 0; }

    .document-letterhead {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding-bottom: 14px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;

    .document-section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);

    .placeholder-list {

      flex-wrap: wrap;
      gap: 7px;

      grid-template-columns: minmax(0, .85fr) minmax(0, 1.15fr);

      background: var(--brand-soft);

      .responsive-table tr {
        padding: 12px;
        border-bottom: 1px solid var(--line);

      .responsive-table tr:last-child { border-bottom: 0; }
      .responsive-table td {
        display: grid;
        grid-template-columns: 128px minmax(0, 1fr);
        gap: 10px;
        padding: 7px 0;

        color: var(--muted);
        font-weight: 850;
        font-size: 12px;
        text-transform: uppercase;

    @media (max-width: 420px) {

        grid-template-columns: minmax(0, 1fr);

      .topbar-actions {
        grid-column: 1 / -1;

      }

        flex: 1 1 auto;
      }
      .responsive-table td {
        grid-template-columns: 1fr;
        gap: 3px;
      }
    }

    document.addEventListener('DOMContentLoaded', init);

    function init() {
      document.body.classList.toggle('public-mode', isPublicMode);
      document.getElementById('brandIcon').innerHTML = icon('plane');
      document.getElementById('mobileClose').innerHTML = icon('x');
      applyThemePreference();
      applySidebarPreference();
      updateSidebarToggleIcon();
      renderNav();
      bindEvents();
      render();
    }

    function bindEvents() {
      document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
      document.getElementById('navScrim').addEventListener('click', closeMobileNav);
      document.addEventListener('click', handleClick);
      document.addEventListener('submit', handleSubmit);
      document.addEventListener('input', handleInput);
      document.addEventListener('change', handleChange);
      document.addEventListener('keydown', handleKeyDown);
      window.addEventListener('resize', function() {
        if (!isMobile()) document.body.classList.remove('mobile-nav-open');
        updateSidebarToggleIcon();
      });
    }

    function handleKeyDown(event) {
      if (event.key === 'Escape' && document.getElementById('modalRoot').innerHTML.trim()) {
        closeModal();
      }
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const normalized = normalizeState(JSON.parse(saved));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
          return normalized;
        }
      } catch (error) {
        console.warn('Could not load saved demo state.', error);
      }
      const seeded = normalizeState(createSeedData());
      localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
      return seeded;
    }

    function normalizeState(data) {
      if (!data.settings) data.settings = {};
      if (!data.templates) data.templates = [];
      getPdfInspiredTemplates().forEach(function(template) {
        if (!data.templates.some(function(item) { return item.id === template.id; })) {
          data.templates.push(template);
        }
      });
      const legacyAgencyNames = ['', 'Harbor & Horizon Travel', 'Travel Agency', 'TravelDesk', 'TravelDesk Demo', 'Travel Agency Command Center Demo'];
      if (legacyAgencyNames.includes(String(data.settings.agencyName || '').trim())) data.settings.agencyName = 'Crosby Travel Adventures';
      if (!data.settings.themeMode) data.settings.themeMode = 'Light';
      return data;
    }

    function getPdfInspiredTemplates() {
      return [
        { id: 'TPL-1007', templateName: 'Customer Information Form - PDF Style', templateType: 'Customer Info PDF', description: 'In-app version modeled after the current Customer Information Form PDF: client details, budget, insurance, travelers, air, cruise, hotel/resort, car rental, package tour, activities, and notes.', googleDocTemplateLinkPlaceholder: 'https://docs.google.com/document/d/template-customer-info-pdf', connectedSheetTab: 'Clients, Leads, Travelers, Trips', active: true },
        { id: 'TPL-1008', templateName: 'Payment Authorization & Insurance Waiver - Secure Demo', templateType: 'Payment Authorization PDF', description: 'In-app version modeled after the current authorization PDF. It records authorization details and waiver status without storing full card numbers, CVV, or sensitive payment credentials.', googleDocTemplateLinkPlaceholder: 'https://docs.google.com/document/d/template-payment-auth-secure', connectedSheetTab: 'Trips, Payments, Documents', active: true }
      ];
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function resetDemoData() {
      state = createSeedData();
      selectedClientId = state.clients[0] ? state.clients[0].id : null;
      alertFilter = 'All';
      saveState();
      localStorage.setItem(THEME_KEY, state.settings.themeMode || 'Light');
      applyThemePreference();
      applySettingsToChrome();
      renderNav();
      render();
      toast('Demo data has been reset.');
    }

    function icon(name, className = '') {
      return '<svg class="icon ' + className + '" viewBox="0 0 24 24" aria-hidden="true">' + (iconPaths[name] || iconPaths.settings) + '</svg>';
    }

    function renderNav() {
      const nav = document.getElementById('navList');
      nav.innerHTML = sections.map(function(item) {
        return '<button class="nav-item ' + (currentSection === item.id ? 'active' : '') + '" type="button" data-section="' + item.id + '" title="' + escapeHtml(item.label) + '">' +
          icon(item.icon) + '<span class="nav-label">' + escapeHtml(item.label) + '</span></button>';
      }).join('');
      applySettingsToChrome();
    }

    function render() {
      if (isPublicMode) currentSection = 'publicForm';
      renderNav();
      renderHeader();
      const app = document.getElementById('app');
      const renderers = {
        dashboard: renderDashboard,
        clients: renderClients,
        leads: renderLeads,
        quotes: renderQuotes,
        trips: renderTrips,
        payments: renderPayments,
        groupCruises: renderGroupCruises,
        documents: renderDocuments,
        publicForm: renderPublicForm,
        settings: renderSettings
      };
      app.innerHTML = (renderers[currentSection] || renderDashboard)();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderHeader() {
      if (isPublicMode) {
        document.getElementById('pageTitle').textContent = 'Trip Request Form';
        document.getElementById('pageEyebrow').textContent = state.settings.agencyName || 'Crosby Travel Adventures';
        document.getElementById('topbarActions').innerHTML = '';
        return;
      }
      const section = sections.find(function(item) { return item.id === currentSection; }) || sections[0];
      document.getElementById('pageTitle').textContent = section.label;
      document.getElementById('pageEyebrow').textContent = (state.settings.agencyName || 'Crosby Travel Adventures') + ' Demo';
      const actions = document.getElementById('topbarActions');
      const actionMap = {
        clients: '<button class="btn" type="button" data-action="open-client-modal">' + icon('plus', 'sm') + '<span class="label-hide">Add Client</span></button>',
        leads: '<button class="btn" type="button" data-action="open-lead-modal">' + icon('plus', 'sm') + '<span class="label-hide">Add Lead</span></button>',
        quotes: '<button class="btn" type="button" data-action="open-quote-builder">' + icon('plus', 'sm') + '<span class="label-hide">Build Quote</span></button>',
        payments: '<button class="btn" type="button" data-action="open-payment-modal">' + icon('plus', 'sm') + '<span class="label-hide">Payment Alert</span></button><button class="btn secondary" type="button" data-action="open-group-deposit-modal">' + icon('plus', 'sm') + '<span class="label-hide">Group Deposit</span></button>',
        documents: '<button class="btn" type="button" data-action="open-document-generator">' + icon('file-text', 'sm') + '<span class="label-hide">Generate Document</span></button>',
        settings: '<button class="btn secondary" type="button" data-action="reset-demo-data">' + icon('refresh', 'sm') + '<span class="label-hide">Reset Data</span></button>'
      };
      actions.innerHTML = '<button class="icon-btn secondary theme-toggle" type="button" data-action="toggle-theme" aria-label="Toggle dark mode" title="Toggle dark mode">' + icon(document.body.classList.contains('dark-mode') ? 'sun' : 'moon') + '</button>' + (actionMap[currentSection] || '<button class="btn secondary" type="button" data-action="go-public-form">' + icon('send', 'sm') + '<span class="label-hide">Public Form</span></button>');
    }

    function toggleSidebar() {
      if (isPublicMode) return;
      if (isMobile()) {
        document.body.classList.toggle('mobile-nav-open');
        updateSidebarToggleIcon();
        return;
      }
      document.body.classList.toggle('nav-collapsed');
      localStorage.setItem(SIDEBAR_KEY, document.body.classList.contains('nav-collapsed') ? 'collapsed' : 'expanded');
      updateSidebarToggleIcon();
    }

    function closeMobileNav() {
      document.body.classList.remove('mobile-nav-open');
      updateSidebarToggleIcon();
    }

    function applySidebarPreference() {
      if (isPublicMode) {
        document.body.classList.remove('nav-collapsed', 'mobile-nav-open');
        return;
      }
      const saved = localStorage.getItem(SIDEBAR_KEY);
      const setting = state.settings.sidebarDefaultState;
      const collapse = saved ? saved === 'collapsed' : setting === 'Collapsed';
      document.body.classList.toggle('nav-collapsed', collapse);
      updateSidebarToggleIcon();
    }

    function updateSidebarToggleIcon() {
      const toggle = document.getElementById('sidebarToggle');
      if (!toggle) return;
      const closed = isMobile() ? !document.body.classList.contains('mobile-nav-open') : document.body.classList.contains('nav-collapsed');
      toggle.innerHTML = icon(closed ? 'chevron-right' : 'chevron-left');
      toggle.setAttribute('aria-label', closed ? 'Open navigation panel' : 'Collapse navigation panel');
      toggle.setAttribute('title', closed ? 'Open navigation panel' : 'Collapse navigation panel');
    }

    function applySettingsToChrome() {
      document.getElementById('brandName').textContent = state.settings.agencyName || 'Crosby Travel Adventures';
      const brandIcon = document.getElementById('brandIcon');
      if (brandIcon) {
        const logoUrl = clean(state.settings.logoUrl);
        if (logoUrl) {
          brandIcon.innerHTML = '<img src="' + escapeAttr(logoUrl) + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:inherit" onerror="this.parentElement.innerHTML=&quot;' + icon('plane').replace(/"/g, '&quot;') + '&quot;">';
        } else {
          brandIcon.innerHTML = icon('plane');
        }
      }
    }

    function applyThemePreference() {
      const saved = localStorage.getItem(THEME_KEY) || state.settings.themeMode || 'Light';
      document.body.classList.toggle('dark-mode', saved === 'Dark');
    }

    function toggleTheme() {
      const dark = !document.body.classList.contains('dark-mode');
      document.body.classList.toggle('dark-mode', dark);
      state.settings.themeMode = dark ? 'Dark' : 'Light';
      localStorage.setItem(THEME_KEY, state.settings.themeMode);
      saveState();
      renderHeader();
      toast((dark ? 'Dark' : 'Light') + ' mode enabled.');
    }

    function openDatePicker(inputId) {
      const input = document.getElementById(inputId);
      if (!input) return;
      input.focus();
      if (typeof input.showPicker === 'function') {
        try {
          input.showPicker();
        } catch (error) {
          input.click();
        }
      }
    }

    function isMobile() {
      return window.matchMedia('(max-width: 900px)').matches;
    }

    function handleClick(event) {
      const navButton = event.target.closest('[data-section]');
      if (navButton) {
        currentSection = navButton.dataset.section;
        closeMobileNav();
        render();
        return;
      }

      const actionButton = event.target.closest('[data-action]');
      if (!actionButton) return;
      const action = actionButton.dataset.action;
      const id = actionButton.dataset.id;
      const type = actionButton.dataset.type;

      const actions = {
        'close-mobile-nav': closeMobileNav,
        'close-modal': closeModal,
        'open-client-modal': function() { openClientModal(); },
        'edit-client': function() { openClientModal(id); },
        'delete-client': function() { deleteClient(id); },
        'open-lead-modal': function() { openLeadModal(); },
        'edit-lead': function() { openLeadModal(id); },
        'delete-lead': function() { deleteLead(id); },
        'open-quote-builder': function() { openQuoteBuilderModal(id); },
        'edit-quote': function() { openQuoteBuilderModal('', id); },
        'delete-quote': function() { deleteQuote(id); },
        'open-trip-modal': function() { openTripModal(); },
        'edit-trip': function() { openTripModal(id); },
        'delete-trip': function() { deleteTrip(id); },
        'open-group-cruise-modal': function() { openGroupCruiseModal(); },
        'edit-group-cruise': function() { openGroupCruiseModal(id); },
        'delete-group-cruise': function() { deleteGroupCruise(id); },
        'open-traveler-modal': function() { openTravelerModal('', id); },
        'edit-traveler': function() { openTravelerModal(id); },
        'delete-traveler': function() { deleteTraveler(id); },
        'open-payment-modal': function() { openPaymentModal(); },
        'delete-payment': function() { deletePayment(id); },
        'open-group-deposit-modal': function() { openGroupDepositModal(); },
        'delete-group-deposit': function() { deleteGroupDeposit(id); },
        'edit-document': function() { openDocumentEditModal(id); },
        'delete-document': function() { deleteDocument(id); },
        'select-client': function() { selectedClientId = id; render(); },
        'quote-preview': function() { openQuotePreview(id); },
        'download-quote': function() { downloadQuote(id); },
        'mark-paid': function() { markAlertPaid(type, id); },
        'edit-payment': function() { openPaymentModal(id); },
        'edit-group-deposit': function() { openGroupDepositModal(id); },
        'set-alert-filter': function() { alertFilter = id; render(); },
        'dashboard-detail': function() { openDashboardDetail(id); },
        'goto-section': function() { closeModal(); currentSection = id; render(); },
        'view-template': function() { openTemplateModal(id); },
        'generate-document': function() { openGenerateDocumentModal(id); },
        'open-document-generator': function() { openGenerateDocumentModal(); },
        'preview-document': function() { openDocumentPreview(id); },
        'download-document': function() { downloadDocument(id); },
        'mark-document-sent': function() { updateDocumentStatus(id, 'Sent'); },
        'mark-document-completed': function() { updateDocumentStatus(id, 'Signed/Completed'); },
        'copy-public-link': copyPublicFormLink,
        'toggle-theme': toggleTheme,
        'open-date-picker': function() { openDatePicker(id); },
        'reset-demo-data': resetDemoData,
        'go-public-form': function() { currentSection = 'publicForm'; render(); },
        'add-inline-traveler': function() { const form = actionButton.closest('form[data-form]'); if (form) addInlineTravelerToTrip(form); },
        'demo-toast': function() { toast(actionButton.dataset.message || 'Demo action recorded.'); }
      };
      if (actions[action]) actions[action]();
    }

    function handleInput(event) {
      if (event.target.id === 'clientSearch') filterClientCards(event.target.value);
    }

    function handleChange(event) {
      if (event.target && event.target.dataset && event.target.dataset.action === 'change-lead-status') {
        const lead = state.leads.find(function(item) { return item.id === event.target.dataset.id; });
        if (lead) {
          lead.status = event.target.value;
          saveState();
          render();
          toast('Lead status updated to ' + lead.status + '.');
        }
        return;
      }
      if (event.target.name !== 'clientId') return;
      const form = event.target.closest('form[data-form]');
      if (!form) return;
      const tripSelect = form.querySelector('#tripId');
      if (tripSelect) tripSelect.innerHTML = tripOptionsHtml('', event.target.value);
      const sourceSelect = form.querySelector('#sourceRecordId');
      if (sourceSelect) sourceSelect.innerHTML = documentSourceOptionsHtml('', event.target.value);
      if (form.dataset.form === 'trip') {
        // Different client -> different traveler list; do not preserve old selections
        refreshTripTravelersSection(form, event.target.value, []);
      }
    }

    function handleSubmit(event) {
      const form = event.target.closest('form[data-form]');
      if (!form) return;
      event.preventDefault();
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      form.querySelectorAll('[data-checkbox-group]').forEach(function(group) {
        data[group.dataset.checkboxGroup] = formData.getAll(group.dataset.checkboxGroup).join(', ');
      });
      const handlers = {
        client: saveClientFromForm,
        lead: saveLeadFromForm,
        quoteBuilder: saveQuoteFromForm,
        publicTripRequest: submitPublicTripRequest,
        paymentAlert: savePaymentAlertFromForm,
        groupDepositAlert: saveGroupDepositFromForm,
        generatedDocument: saveGeneratedDocumentFromForm,
        settings: saveSettingsFromForm,
        trip: saveTripFromForm,
        groupCruise: saveGroupCruiseFromForm,
        traveler: saveTravelerFromForm,
        documentEdit: saveDocumentEditFromForm
      };
      const handler = handlers[form.dataset.form];
      if (handler) handler(data, form);
    }

    function renderDashboard() {
      const metrics = getDashboardMetrics();
      const todaysAlerts = getAllAlerts().filter(function(alert) {
        return alert.status !== 'Paid' && compareIso(alert.dueDate, todayIso()) <= 0;
      }).sort(sortByDueDate);
      const soonPayments = state.payments.filter(function(payment) {
        const status = computedPaymentStatus(payment.dueDate, payment.status, state.settings.clientPaymentReminderWindowDays);
        return status !== 'Paid' && compareIso(payment.dueDate, addDays(Number(state.settings.clientPaymentReminderWindowDays || 14))) <= 0;
      }).sort(sortByDueDate);
      const agentDeposits = state.groupDeposits.filter(function(deposit) {
        return deposit.appliesTo === 'Agent' && computedPaymentStatus(deposit.dueDate, deposit.status, state.settings.groupCruiseDepositReminderWindowDays) !== 'Paid';
      }).sort(sortByDueDate);
      const departingSoon = state.trips.filter(function(trip) {
        return compareIso(trip.travelStartDate, todayIso()) >= 0 && compareIso(trip.travelStartDate, addDays(45)) <= 0;
      }).sort(function(a, b) { return compareIso(a.travelStartDate, b.travelStartDate); });
      const recentLeads = state.leads.slice().sort(function(a, b) { return compareIso(b.createdDate, a.createdDate); }).slice(0, 5);

      return '<div class="section-grid">' +
        '<div class="kpi-grid">' + metrics.map(renderKpi).join('') + '</div>' +
        '<div class="grid two">' +
          panel('Today\'s Alerts', 'Client deadlines and agent/group cruise deposits due today or overdue.', renderAlertRows(todaysAlerts.slice(0, 7))) +
          panel('Upcoming Client Reservation Payments', 'Client-facing reservation payments due soon.', renderPaymentRows(soonPayments.slice(0, 7))) +
          panel('Agent Group Cruise Deposits', 'Deposits that apply specifically to the travel agent or agency.', renderGroupDepositRows(agentDeposits.slice(0, 6))) +
          panel('Trips Departing Soon', 'Booked travel coming up in the next 45 days.', renderTripRows(departingSoon.slice(0, 6))) +
        '</div>' +
        panel('Recent Leads', 'Newest public form submissions and manually entered trip requests.', renderLeadRows(recentLeads)) +
      '</div>';
    }

    function renderKpi(metric) {
      return '<button class="kpi-card ' + metric.tone + '" type="button" data-action="dashboard-detail" data-id="' + metric.id + '" aria-label="View ' + escapeAttr(metric.label) + '">' +
        '<div class="kpi-top"><span>' + escapeHtml(metric.label) + '</span>' + icon(metric.icon, 'sm') + '</div>' +
        '<div class="kpi-value">' + metric.value + '</div>' +
        '<div class="kpi-note">' + escapeHtml(metric.note) + '</div>' +
      '</button>';
    }

    function getDashboardMetrics() {
      const clientWindow = Number(state.settings.clientPaymentReminderWindowDays || 14);
      const groupWindow = Number(state.settings.groupCruiseDepositReminderWindowDays || 21);
      const allAlerts = getAllAlerts();
      return [
        { id: 'newLeads', label: 'New Leads', value: state.leads.filter(byStatus('New')).length, note: 'Needs first follow-up', icon: 'inbox', tone: 'brand' },
        { id: 'activeQuotes', label: 'Active Quotes', value: state.quotes.filter(function(q) { return ['Draft', 'Sent', 'Pending Client'].includes(q.quoteStatus); }).length, note: 'Open quote packages', icon: 'file-text', tone: 'purple' },
        { id: 'upcomingTrips', label: 'Upcoming Trips', value: state.trips.filter(function(t) { return compareIso(t.travelStartDate, todayIso()) >= 0; }).length, note: 'Booked future travel', icon: 'map', tone: 'good' },
        { id: 'clientPaymentsDue', label: 'Client Payments Due', value: state.payments.filter(function(p) { return computedPaymentStatus(p.dueDate, p.status, clientWindow) === 'Due Soon'; }).length, note: 'Reservation payments soon', icon: 'bell', tone: 'warn' },
        { id: 'overdueClientPayments', label: 'Overdue Client Payments', value: state.payments.filter(function(p) { return computedPaymentStatus(p.dueDate, p.status, clientWindow) === 'Overdue'; }).length, note: 'Needs client outreach', icon: 'bell', tone: 'danger' },
        { id: 'groupCruiseDepositsDue', label: 'Group Cruise Deposits Due', value: state.groupDeposits.filter(function(d) { return d.appliesTo !== 'Agent' && ['Due Soon', 'Overdue'].includes(computedPaymentStatus(d.dueDate, d.status, groupWindow)); }).length, note: 'Group/client cruise items', icon: 'ship', tone: 'purple' },
        { id: 'agentGroupDepositsDue', label: 'Agent-Specific Group Deposits Due', value: state.groupDeposits.filter(function(d) { return d.appliesTo === 'Agent' && ['Due Soon', 'Overdue'].includes(computedPaymentStatus(d.dueDate, d.status, groupWindow)); }).length, note: 'Agency responsibility', icon: 'bell', tone: 'coral' },
        { id: 'documentsNeeded', label: 'Documents Needed', value: state.documents.filter(byStatus('Needed')).length, note: 'Forms or packets pending', icon: 'folder', tone: 'brand' },
        { id: 'alertsDueToday', label: 'Alerts Due Today', value: allAlerts.filter(function(a) { return a.status !== 'Paid' && a.dueDate === todayIso(); }).length, note: 'Exact due date today', icon: 'bell', tone: 'warn' }
      ];
    }

    function openDashboardDetail(metricId) {
      const detail = getDashboardDetail(metricId);
      if (!detail) return;
      const sectionMap = {
        newLeads: 'leads', activeQuotes: 'quotes', upcomingTrips: 'trips',
        clientPaymentsDue: 'payments', overdueClientPayments: 'payments',
        groupCruiseDepositsDue: 'payments', agentGroupDepositsDue: 'payments',
        documentsNeeded: 'documents', alertsDueToday: 'payments'
      };
      const targetSection = sectionMap[metricId];
      const gotoBtn = targetSection ? '<button class="btn" type="button" data-action="goto-section" data-id="' + targetSection + '">' + icon('chevron-right', 'sm') + 'Open ' + escapeHtml(targetSection.charAt(0).toUpperCase() + targetSection.slice(1)) + '</button>' : '';
      openModal(detail.title, '<p class="panel-subtitle" style="margin-bottom:14px">' + escapeHtml(detail.subtitle) + '</p>' + detail.content + '<div class="modal-actions"><button class="btn secondary" type="button" data-action="close-modal">Close</button>' + gotoBtn + '</div>', true);
    }

    function getDashboardDetail(metricId) {
      const clientWindow = Number(state.settings.clientPaymentReminderWindowDays || 14);
      const groupWindow = Number(state.settings.groupCruiseDepositReminderWindowDays || 21);
      const allAlerts = getAllAlerts();
      const details = {
        newLeads: {
          title: 'New Leads',
          subtitle: 'Trip requests waiting for first review or follow-up.',
          content: renderLeadRows(state.leads.filter(byStatus('New')))
        },
        activeQuotes: {
          title: 'Active Quotes',
          subtitle: 'Quote packages currently open, drafted, sent, or waiting on a client.',
          content: renderQuoteMiniRows(state.quotes.filter(function(q) { return ['Draft', 'Sent', 'Pending Client'].includes(q.quoteStatus); }))
        },
        upcomingTrips: {
          title: 'Upcoming Trips',
          subtitle: 'Booked future trips sorted by departure date.',
          content: renderTripRows(state.trips.filter(function(t) { return compareIso(t.travelStartDate, todayIso()) >= 0; }).sort(function(a, b) { return compareIso(a.travelStartDate, b.travelStartDate); }))
        },
        clientPaymentsDue: {
          title: 'Client Payments Due',
          subtitle: 'Client reservation payments inside the reminder window.',
          content: renderPaymentRows(state.payments.filter(function(p) { return computedPaymentStatus(p.dueDate, p.status, clientWindow) === 'Due Soon'; }).sort(sortByDueDate))
        },
        overdueClientPayments: {
          title: 'Overdue Client Payments',
          subtitle: 'Client reservation payments past their due date.',
          content: renderPaymentRows(state.payments.filter(function(p) { return computedPaymentStatus(p.dueDate, p.status, clientWindow) === 'Overdue'; }).sort(sortByDueDate))
        },
        groupCruiseDepositsDue: {
          title: 'Group Cruise Deposits Due',
          subtitle: 'Group-hold or group client deposit alerts due soon or overdue.',
          content: renderGroupDepositRows(state.groupDeposits.filter(function(d) { return d.appliesTo !== 'Agent' && ['Due Soon', 'Overdue'].includes(computedPaymentStatus(d.dueDate, d.status, groupWindow)); }).sort(sortByDueDate))
        },
        agentGroupDepositsDue: {
          title: 'Agent-Specific Group Deposits Due',
          subtitle: 'Deposit alerts that apply to the agent or agency, not the client.',
          content: renderGroupDepositRows(state.groupDeposits.filter(function(d) { return d.appliesTo === 'Agent' && ['Due Soon', 'Overdue'].includes(computedPaymentStatus(d.dueDate, d.status, groupWindow)); }).sort(sortByDueDate))
        },
        documentsNeeded: {
          title: 'Documents Needed',
          subtitle: 'Client documents still marked as needed.',
          content: renderDocumentRows(state.documents.filter(byStatus('Needed')))
        },
        alertsDueToday: {
          title: 'Alerts Due Today',
          subtitle: 'All unpaid alerts with a due date of today.',
          content: renderAlertRows(allAlerts.filter(function(a) { return a.status !== 'Paid' && a.dueDate === todayIso(); }))
        }
      };
      if (details[metricId] && details[metricId].content.includes('empty-state')) return details[metricId];
      if (details[metricId] && !details[metricId].content.trim()) details[metricId].content = emptyState('No records match this dashboard card.');
      return details[metricId];
    }

    function renderClients() {
      const selected = state.clients.find(function(client) { return client.id === selectedClientId; }) || state.clients[0];
      if (selected && selected.id !== selectedClientId) selectedClientId = selected.id;
      return '<div class="detail-grid">' +
        '<section class="panel">' +
          '<div class="panel-header"><div><h2 class="panel-title">Client Database</h2><p class="panel-subtitle">Search stored contact, preference, and trip history records.</p></div><button class="btn small" type="button" data-action="open-client-modal">' + icon('plus', 'sm') + 'Add</button></div>' +
          '<div class="field"><label for="clientSearch">Search clients</label><input id="clientSearch" type="search" placeholder="Search by name, email, phone, airport, notes..."></div>' +
          '<div class="client-list" id="clientList">' + state.clients.map(renderClientCard).join('') + '</div>' +
        '</section>' +
        '<section class="panel">' + renderClientDetail(selected) + '</section>' +
      '</div>';
    }

    function renderClientCard(client) {
      const searchable = [client.firstName, client.lastName, client.email, client.phone, client.preferredAirport, client.travelPreferences, client.notes].join(' ').toLowerCase();
      return '<article class="client-card ' + (client.id === selectedClientId ? 'active' : '') + '" data-client-card data-search="' + escapeAttr(searchable) + '">' +
        '<h3>' + escapeHtml(client.firstName + ' ' + client.lastName) + '</h3>' +
        '<div class="item-meta"><span>' + escapeHtml(client.email) + '</span><span>' + escapeHtml(client.phone) + '</span></div>' +
        '<div class="item-meta"><span>' + escapeHtml(client.preferredAirport) + '</span><span>' + escapeHtml(client.budgetRange) + '</span></div>' +
        '<div class="button-row"><button class="btn small secondary" type="button" data-action="select-client" data-id="' + client.id + '">' + icon('eye', 'sm') + 'View</button><button class="btn small secondary" type="button" data-action="edit-client" data-id="' + client.id + '">' + icon('edit', 'sm') + 'Edit</button><button class="btn small danger" type="button" data-action="delete-client" data-id="' + client.id + '">' + icon('x', 'sm') + 'Delete</button></div>' +
      '</article>';
    }

    function renderClientDetail(client) {
      if (!client) return emptyState('No client selected.');
      const travelers = state.travelers.filter(function(traveler) { return traveler.clientId === client.id; });
      const leads = state.leads.filter(function(lead) { return lead.clientId === client.id; });
      const quotes = state.quotes.filter(function(quote) { return quote.clientId === client.id; });
      const trips = state.trips.filter(function(trip) { return trip.clientId === client.id; });
      const payments = state.payments.filter(function(payment) { return payment.clientId === client.id; });
      const documents = state.documents.filter(function(documentRecord) { return documentRecord.clientId === client.id; });
      return '<div class="panel-header"><div><h2 class="panel-title">' + escapeHtml(client.firstName + ' ' + client.lastName) + '</h2><p class="panel-subtitle">' + escapeHtml(client.id) + ' | Updated ' + formatDate(client.updatedDate) + '</p></div><div class="button-row">' + passportBadge(client.passportStatus) + '<button class="btn small secondary" type="button" data-action="edit-client" data-id="' + client.id + '">' + icon('edit', 'sm') + 'Edit</button><button class="btn small danger" type="button" data-action="delete-client" data-id="' + client.id + '">' + icon('x', 'sm') + 'Delete</button></div></div>' +
        '<div class="info-grid">' +
          infoTile('Phone', client.phone) +
          infoTile('Email', client.email) +
          infoTile('Preferred airport', client.preferredAirport) +
          infoTile('Address', client.address) +
          infoTile('Budget range', client.budgetRange) +
          infoTile('Created', formatDate(client.createdDate)) +
        '</div>' +
        '<div class="grid two" style="margin-top:14px">' +
          miniPanel('Travel Preferences', '<p class="small muted">' + escapeHtml(client.travelPreferences) + '</p>') +
          miniPanel('Notes', '<p class="small muted">' + escapeHtml(client.notes) + '</p>') +
        '</div>' +
        '<div class="grid two" style="margin-top:14px">' +
          miniPanel('Associated Travelers', (travelers.length ? travelers.map(renderTravelerRow).join('') : emptyState('No associated travelers yet.')) + '<div class="button-row" style="margin-top:8px"><button class="btn small" type="button" data-action="open-traveler-modal" data-id="' + client.id + '">' + icon('plus', 'sm') + 'Add Traveler</button></div>') +
          miniPanel('Active Leads', leads.length ? renderLeadRows(leads) : emptyState('No active leads.')) +
          miniPanel('Active Quotes', quotes.length ? renderQuoteMiniRows(quotes) : emptyState('No active quotes.')) +
          miniPanel('Booked Trips', trips.length ? renderTripRows(trips) : emptyState('No booked trips.')) +
          miniPanel('Payment Alerts', payments.length ? renderPaymentRows(payments) : emptyState('No payment alerts.')) +
          miniPanel('Documents', documents.length ? renderDocumentRows(documents) : emptyState('No documents yet.')) +
        '</div>';
    }

    function renderTravelerRow(traveler) {
      const contactBits = [traveler.phone, traveler.email].filter(Boolean).map(function(v) { return '<span>' + escapeHtml(v) + '</span>'; }).join('');
      const contactMeta = contactBits ? '<div class="item-meta">' + contactBits + '</div>' : '';
      const addressMeta = traveler.address ? '<div class="item-meta"><span>' + escapeHtml(traveler.address) + '</span></div>' : '';
      return '<div class="item-row"><div><p class="item-title">' + escapeHtml(traveler.firstName + ' ' + traveler.lastName) + '</p><div class="item-meta"><span>DOB ' + formatDate(traveler.dateOfBirth) + '</span><span>' + escapeHtml(traveler.relationship) + '</span><span>Passport: ' + escapeHtml(traveler.passportStatus) + '</span></div>' + contactMeta + addressMeta + '</div><div class="button-row"><button class="btn small secondary" type="button" data-action="edit-traveler" data-id="' + traveler.id + '">' + icon('edit', 'sm') + 'Edit</button><button class="btn small danger" type="button" data-action="delete-traveler" data-id="' + traveler.id + '">' + icon('x', 'sm') + 'Delete</button></div></div>';
    }

    function renderLeads() {
      return '<div class="section-grid">' +
        '<section class="panel">' +
          '<div class="panel-header"><div><h2 class="panel-title">Trip Request Pipeline</h2><p class="panel-subtitle">Track public inquiries and manually created leads from first request through booking.</p></div><button class="btn" type="button" data-action="open-lead-modal">' + icon('plus', 'sm') + 'Add Lead</button></div>' +
          '<div class="pipeline">' + leadStatuses.map(renderLeadColumn).join('') + '</div>' +
        '</section>' +
      '</div>';
    }

    function renderLeadColumn(status) {
      const leads = state.leads.filter(byStatus(status));
      return '<div class="pipeline-column"><div class="pipeline-title"><span>' + escapeHtml(status) + '</span><span class="badge neutral">' + leads.length + '</span></div>' +
        (leads.length ? leads.map(renderLeadCard).join('') : '<div class="empty-state">No leads</div>') +
      '</div>';
    }

    function renderLeadCard(lead) {
      const statusOptions = leadStatuses.map(function(s) { return '<option value="' + escapeAttr(s) + '"' + (s === lead.status ? ' selected' : '') + '>' + escapeHtml(s) + '</option>'; }).join('');
      return '<article class="lead-card">' +
        '<div><h3>' + escapeHtml(lead.destination) + '</h3><div class="item-meta"><span>' + escapeHtml(lead.clientName) + '</span><span>' + formatDate(lead.travelStartDate) + ' - ' + formatDate(lead.travelEndDate) + '</span></div></div>' +
        '<div class="item-meta"><span>' + escapeHtml(lead.tripType) + '</span><span>' + lead.numberOfAdults + ' adults</span><span>' + lead.numberOfChildren + ' children</span></div>' +
        '<div class="item-meta"><span>Budget ' + escapeHtml(lead.budget) + '</span><span>Follow-up ' + formatDate(lead.followUpDate) + '</span></div>' +
        '<p class="small muted">' + escapeHtml(lead.mustHaves) + '</p>' +
        '<div class="field" style="margin-top:8px"><label>Status</label><select data-action="change-lead-status" data-id="' + lead.id + '">' + statusOptions + '</select></div>' +
        '<div class="button-row"><button class="btn small" type="button" data-action="open-quote-builder" data-id="' + lead.id + '">' + icon('file-text', 'sm') + 'Build Quote</button><button class="btn small secondary" type="button" data-action="edit-lead" data-id="' + lead.id + '">' + icon('edit', 'sm') + 'Edit</button><button class="btn small danger" type="button" data-action="delete-lead" data-id="' + lead.id + '">' + icon('x', 'sm') + 'Delete</button></div>' +
      '</article>';
    }

    function renderQuotes() {
      return '<div class="section-grid">' +
        '<section class="panel">' +
          '<div class="panel-header"><div><h2 class="panel-title">Quote Packages</h2><p class="panel-subtitle">Build client-facing quote packages with multiple options, then preview or download them.</p></div><button class="btn" type="button" data-action="open-quote-builder">' + icon('plus', 'sm') + 'Build Quote</button></div>' +
          '<div class="grid two">' + state.quotes.map(renderQuotePackage).join('') + '</div>' +
        '</section>' +
      '</div>';
    }

    function renderQuotePackage(quote) {
      const options = state.quoteOptions.filter(function(option) { return option.quoteId === quote.id; });
      return '<article class="card">' +
        '<div class="panel-header"><div><h2 class="panel-title">' + escapeHtml(quote.clientName) + '</h2><p class="panel-subtitle">' + escapeHtml(quote.id) + ' | Created ' + formatDate(quote.dateCreated) + '</p></div>' + statusBadge(quote.quoteStatus) + '</div>' +
        '<div class="info-grid">' +
          infoTile('Sent', quote.dateSent ? formatDate(quote.dateSent) : 'Not sent') +
          infoTile('Expires', formatDate(quote.expirationDate)) +
          infoTile('Follow-up', formatDate(quote.followUpDate)) +
        '</div>' +
        '<p class="small muted" style="margin:12px 0 0">' + escapeHtml(quote.notes) + '</p>' +
        '<div class="quote-options">' + (options.length ? options.map(renderQuoteOption).join('') : emptyState('No quote options yet.')) + '</div>' +
        '<div class="button-row" style="margin-top:13px"><button class="btn small" type="button" data-action="quote-preview" data-id="' + quote.id + '">' + icon('eye', 'sm') + 'Quote Preview</button><button class="btn small secondary" type="button" data-action="download-quote" data-id="' + quote.id + '">' + icon('download', 'sm') + 'Download (HTML \u2014 print to PDF)</button><button class="btn small secondary" type="button" data-action="edit-quote" data-id="' + quote.id + '">' + icon('edit', 'sm') + 'Edit</button><button class="btn small danger" type="button" data-action="delete-quote" data-id="' + quote.id + '">' + icon('x', 'sm') + 'Delete</button></div>' +
      '</article>';
    }

    function renderQuoteOption(option) {
      const imageUrl = clean(option.imageUrlPlaceholder);
      const isValidImg = imageUrl && /^https?:\/\//i.test(imageUrl);
      const thumb = isValidImg
        ? '<div class="option-thumb" style="background-image:linear-gradient(rgba(18,70,92,0.55),rgba(18,70,92,0.55)),url(\'' + escapeAttr(imageUrl) + '\');background-size:cover;background-position:center">' + escapeHtml(option.optionName) + '</div>'
        : '<div class="option-thumb">' + escapeHtml(option.optionName) + '</div>';
      return '<div class="option-card">' +
        thumb +
        '<div><p class="item-title">' + escapeHtml(option.resortHotelOrCruiseName) + '</p><div class="item-meta"><span>' + escapeHtml(option.destination) + '</span><span>' + escapeHtml(option.supplier) + '</span></div></div>' +
        '<div class="info-grid">' + infoTile('Total', formatMoney(option.totalPrice)) + infoTile('Deposit', formatMoney(option.depositAmount)) + infoTile('Final due', formatDate(option.finalPaymentDueDate)) + '</div>' +
        '<p class="small muted">' + escapeHtml(option.inclusions) + '</p>' +
      '</div>';
    }

    function renderTrips() {
      const rows = state.trips.slice().sort(function(a, b) { return compareIso(a.travelStartDate, b.travelStartDate); });
      return '<div class="section-grid">' +
        '<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Booked Trips</h2><p class="panel-subtitle">Reservation status, final payments, insurance, and document readiness.</p></div><button class="btn" type="button" data-action="open-trip-modal">' + icon('plus', 'sm') + 'Add Trip</button></div><div class="table-shell responsive-table"><table><thead><tr><th>Client</th><th>Trip</th><th>Dates</th><th>Supplier</th><th>Travelers</th><th>Final Payment</th><th>Status</th><th>Insurance</th><th>Actions</th></tr></thead><tbody>' + rows.map(renderTripTableRow).join('') + '</tbody></table></div></section>' +
      '</div>';
    }

    function renderTripTableRow(trip) {
      const tripTravelers = (trip.travelerIds || []).map(function(id) { return state.travelers.find(function(t) { return t.id === id; }); }).filter(Boolean);
      const travelersCell = tripTravelers.length
        ? '<strong>' + tripTravelers.length + ' on reservation</strong><br><span class="small muted">' + escapeHtml(tripTravelers.map(function(t) { return t.firstName + ' ' + t.lastName; }).join(', ')) + '</span>'
        : '<span class="small muted">Primary client only</span>';
      return '<tr>' +
        '<td data-label="Client"><strong>' + escapeHtml(trip.clientName) + '</strong><br><span class="small muted">' + escapeHtml(trip.bookingNumber) + '</span></td>' +
        '<td data-label="Trip">' + escapeHtml(trip.destination) + '<br><span class="small muted">' + escapeHtml(trip.tripType) + '</span></td>' +
        '<td data-label="Dates">' + formatDate(trip.travelStartDate) + '<br><span class="small muted">to ' + formatDate(trip.travelEndDate) + '</span></td>' +
        '<td data-label="Supplier">' + escapeHtml(trip.supplier) + '</td>' +
        '<td data-label="Travelers">' + travelersCell + '</td>' +
        '<td data-label="Final Payment">' + formatMoney(trip.finalPaymentAmount) + '<br><span class="small muted">' + formatDate(trip.finalPaymentDueDate) + '</span></td>' +
        '<td data-label="Status">' + tripStatusBadges(trip).join(' ') + '</td>' +
        '<td data-label="Insurance">' + escapeHtml(trip.insuranceOffered ? trip.insuranceStatus : 'Not offered') + '</td>' +
        '<td data-label="Actions"><div class="button-row"><button class="btn small secondary" type="button" data-action="edit-trip" data-id="' + trip.id + '">' + icon('edit', 'sm') + 'Edit</button><button class="btn small danger" type="button" data-action="delete-trip" data-id="' + trip.id + '">' + icon('x', 'sm') + 'Delete</button></div></td>' +
      '</tr>';
    }

    function renderPayments() {
      const alerts = getFilteredAlerts();
      return '<div class="section-grid">' +
        '<section class="panel">' +
          '<div class="panel-header"><div><h2 class="panel-title">Payments & Alerts Center</h2><p class="panel-subtitle">Client reservation payments are separate from agent-specific and group-hold cruise deposits.</p></div><div class="button-row"><button class="btn small" type="button" data-action="open-payment-modal">' + icon('plus', 'sm') + 'Payment Alert</button><button class="btn small secondary" type="button" data-action="open-group-deposit-modal">' + icon('plus', 'sm') + 'Group Deposit</button></div></div>' +
          '<div class="filters">' + paymentFilterLabels.map(function(label) { return '<button class="chip ' + (alertFilter === label ? 'active' : '') + '" type="button" data-action="set-alert-filter" data-id="' + label + '">' + escapeHtml(label) + '</button>'; }).join('') + '</div>' +
        '</section>' +
        '<div class="grid">' + (alerts.length ? alerts.map(renderAlertCard).join('') : emptyState('No alerts match this filter.')) + '</div>' +
      '</div>';
    }

    function renderAlertCard(alert) {
      const isPaid = alert.status === 'Paid';
      const cardClass = alert.status === 'Overdue' ? 'overdue' : isPaid ? 'paid' : alert.visualType;
      const applies = alert.appliesTo || 'Client Reservation';
      const deleteBtn = '<button class="btn small danger" type="button" data-action="' + (alert.kind === 'payment' ? 'delete-payment' : 'delete-group-deposit') + '" data-id="' + alert.id + '">' + icon('x', 'sm') + 'Delete</button>';
      const actions = isPaid ? '<button class="btn small secondary" type="button" data-action="' + (alert.kind === 'payment' ? 'edit-payment' : 'edit-group-deposit') + '" data-id="' + alert.id + '">' + icon('edit', 'sm') + 'Edit</button>' + deleteBtn :
        '<button class="btn small success" type="button" data-action="mark-paid" data-type="' + alert.kind + '" data-id="' + alert.id + '">' + icon('check', 'sm') + 'Mark Paid</button><button class="btn small secondary" type="button" data-action="' + (alert.kind === 'payment' ? 'edit-payment' : 'edit-group-deposit') + '" data-id="' + alert.id + '">' + icon('edit', 'sm') + 'Edit</button>' + deleteBtn;
      return '<article class="alert-card ' + cardClass + '">' +
        '<div>' +
          '<div class="button-row" style="margin-bottom:8px">' + paymentContextBadge(alert) + statusBadge(alert.status) + '</div>' +
          '<p class="item-title">' + escapeHtml(alert.title) + '</p>' +
          '<div class="item-meta"><span>Due ' + formatDate(alert.dueDate) + '</span><span>' + formatMoney(alert.amountDue) + '</span><span>Applies to: ' + escapeHtml(applies) + '</span></div>' +
          '<p class="small muted" style="margin:8px 0 0">' + escapeHtml(alert.notes || '') + '</p>' +
        '</div>' +
        '<div class="button-row">' + actions + '</div>' +
      '</article>';
    }

    function renderGroupCruises() {
      return '<div class="section-grid">' +
        '<section class="panel"><div class="panel-header"><div><h2 class="panel-title">Group Cruise Tracker</h2><p class="panel-subtitle">Separate agent deposits, client payment rules, and group cabin-hold deadlines.</p></div><div class="button-row"><button class="btn" type="button" data-action="open-group-cruise-modal">' + icon('plus', 'sm') + 'Add Group Cruise</button><button class="btn small secondary" type="button" data-action="open-group-deposit-modal">' + icon('plus', 'sm') + 'Add Deposit Alert</button></div></div></section>' +
        state.groupCruises.map(renderGroupCruiseCard).join('') +
      '</div>';
    }

    function renderGroupCruiseCard(cruise) {
      const deposits = state.groupDeposits.filter(function(deposit) { return deposit.groupCruiseId === cruise.id; });
      const agentDeposits = deposits.filter(function(deposit) { return deposit.appliesTo === 'Agent'; });
      const linkedTrips = state.trips.filter(function(trip) { return trip.groupCruiseId === cruise.id; });
      return '<article class="panel">' +
        '<div class="panel-header"><div><h2 class="panel-title">' + escapeHtml(cruise.cruiseName) + '</h2><p class="panel-subtitle">' + escapeHtml(cruise.cruiseLine) + ' | ' + escapeHtml(cruise.ship) + ' | Sails ' + formatDate(cruise.sailingDate) + '</p></div><div class="button-row">' + statusBadge(cruise.groupHoldStatus) + '<button class="btn small secondary" type="button" data-action="edit-group-cruise" data-id="' + cruise.id + '">' + icon('edit', 'sm') + 'Edit</button><button class="btn small danger" type="button" data-action="delete-group-cruise" data-id="' + cruise.id + '">' + icon('x', 'sm') + 'Delete</button></div></div>' +
        '<div class="info-grid">' +
          infoTile('Return', formatDate(cruise.returnDate)) +
          infoTile('Cabins held', cruise.numberOfCabinsHeld) +
          infoTile('Cabins booked', cruise.numberOfCabinsBooked) +
          infoTile('Group leader', cruise.groupLeaderContact) +
          infoTile('Itinerary', cruise.itinerary) +

    function openQuoteBuilderModal(leadId, quoteId) {

      const existingOptions = editingQuote ? state.quoteOptions.filter(function(o) { return o.quoteId === editingQuote.id; }) : [];

        const existing = existingOptions[index - 1];
        return quoteOptionFieldsFromExisting(index, defaultName, lead, required, existing);
      };

      const opt3 = '<details class="quote-option-collapse"' + (existingOptions[2] ? ' open' : '') + '><summary style="cursor:pointer;padding:8px 0;font-weight:700;color:var(--accent)">+ Add Quote Option 3 (optional)</summary>' + optionFields(3, '', false) + '</details>';

    function saveQuoteFromForm(data) {
      const lead = state.leads.find(function(item) { return item.id === data.leadId; });
      const client = lead ? state.clients.find(function(item) { return item.id === lead.clientId; }) : null;
      if (!lead || !client) {
        toast('Please choose a valid lead for this quote.');
        return;
      }
      const options = collectQuoteOptionsFromForm(data);
      if (!options.length) {
        toast('Add at least one quote option before generating the quote.');
        return;
      }
      const existing = data.id ? state.quotes.find(function(item) { return item.id === data.id; }) : null;
      const quote = existing || {
        id: makeId('Q'),
        leadId: lead.id,
        clientId: client.id,
        clientName: client.firstName + ' ' + client.lastName
      };
      quote.leadId = lead.id;
      quote.clientId = client.id;
      quote.clientName = client.firstName + ' ' + client.lastName;
      quote.quoteStatus = clean(data.quoteStatus || 'Draft');
      quote.dateCreated = data.dateCreated || quote.dateCreated || todayIso();
      quote.dateSent = data.dateSent || (data.quoteStatus === 'Sent' ? todayIso() : (quote.dateSent || ''));
      quote.expirationDate = data.expirationDate || addDays(Number(state.settings.defaultQuoteExpirationDays || 10));
      quote.followUpDate = data.followUpDate || addDays(Number(state.settings.defaultFollowUpDays || 3));
      quote.notes = clean(data.notes);
      if (!existing) state.quotes.unshift(quote);
      // Replace all options for this quote
      state.quoteOptions = state.quoteOptions.filter(function(o) { return o.quoteId !== quote.id; });
      options.forEach(function(option) {
        option.id = makeId('QO');
        option.quoteId = quote.id;
        state.quoteOptions.unshift(option);
      });
      if (quote.quoteStatus === 'Sent' || quote.quoteStatus === 'Pending Client') {
        lead.status = 'Quote Sent';
      } else if (lead.status === 'New') {
        lead.status = 'Researching';
      }
      lead.followUpDate = quote.followUpDate;
      saveState();
      currentSection = 'quotes';
      render();
      if (!existing) openQuotePreview(quote.id);
      else closeModal();
      toast(existing ? 'Quote updated.' : 'Quote generated and saved.');
    }

    function collectQuoteOptionsFromForm(data) {
      return [1, 2, 3].map(function(index) {
        const optionName = clean(data['optionName' + index]);
        const supplier = clean(data['supplier' + index]);
        const resortHotelOrCruiseName = clean(data['resortHotelOrCruiseName' + index]);
        const totalPrice = Number(data['totalPrice' + index] || 0);
        const hasContent = optionName || supplier || resortHotelOrCruiseName || totalPrice;
        if (!hasContent) return null;
        return {
          optionName: optionName || 'Option ' + index,
          destination: clean(data['optionDestination' + index]),
          resortHotelOrCruiseName: resortHotelOrCruiseName || 'Supplier option to confirm',
          roomTypeOrCabinType: clean(data['roomTypeOrCabinType' + index]),
          supplier: supplier || 'Supplier to confirm',
          travelDates: clean(data['travelDates' + index]),
          totalPrice: totalPrice,
          depositAmount: Number(data['depositAmount' + index] || 0),
          finalPaymentDueDate: data['finalPaymentDueDate' + index] || '',
          inclusions: clean(data['inclusions' + index]),
          pros: clean(data['pros' + index]),
          cons: clean(data['cons' + index]),
          internalNotes: clean(data['internalNotes' + index]),
          imageUrlPlaceholder: clean(data['imageUrlPlaceholder' + index])
        };
      }).filter(Boolean);
    }

    function buildPlaceholderData(template, trip, client) {
      const travelers = state.travelers.filter(function(item) { return item.clientId === client.id; });
      const lead = state.leads.find(function(item) { return item.clientId === client.id && trip.destination.toLowerCase().includes(item.destination.split(' ')[0].toLowerCase()); }) ||
        state.leads.find(function(item) { return item.clientId === client.id; }) || {};
      const payments = state.payments.filter(function(item) { return item.tripId === trip.id; });
      const nextPayment = payments.slice().sort(function(a, b) { return compareIso(a.dueDate, b.dueDate); }).find(function(item) { return item.status !== 'Paid'; }) || {};
      const quote = state.quotes.find(function(item) { return item.clientId === client.id; }) || {};
      const options = quote.id ? state.quoteOptions.filter(function(item) { return item.quoteId === quote.id; }) : [];
      const groupCruise = trip.groupCruiseId ? state.groupCruises.find(function(item) { return item.id === trip.groupCruiseId; }) : null;
      const passengerNames = [client.firstName + ' ' + client.lastName].concat(travelers.map(function(item) { return item.firstName + ' ' + item.lastName; })).join(', ');
      const tripLength = Math.max(1, daysBetween(trip.travelStartDate, trip.travelEndDate));
      const activities = getActivitySummary(lead, trip, client);
      return {
        AgencyName: state.settings.agencyName,
        AgentName: state.settings.agentName,
        AgentEmail: state.settings.agentEmail,
        AgentPhone: state.settings.agentPhone || 'Not configured',
        ClientFirstName: client.firstName,
        ClientLastName: client.lastName,
        ClientFullName: client.firstName + ' ' + client.lastName,
        ClientEmail: client.email,
        ClientPhone: client.phone,
        ClientAddress: client.address,
        PreferredAirport: client.preferredAirport,
        TravelPreferences: client.travelPreferences,
        BudgetRange: client.budgetRange || lead.budget || '',
        PassportStatus: client.passportStatus,
