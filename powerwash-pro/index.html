      if (!v) return "";
      const [h, m] = v.split(":").map(Number);
      if (Number.isNaN(h) || Number.isNaN(m)) return v;
      const suffix = h >= 12 ? "PM" : "AM";

      const job = get.job(invoice.jobId);
      const quote = job?.quoteId ? get.quote(job.quoteId) : null;

      return [{ description: job?.notes || "Pressure washing service", amount: invoice.subtotal }];

    function metrics() {
      const month = today().getMonth();
      const year = today().getFullYear();
      const paidInvoices = db.invoices.filter(i => i.status === "Paid");
      const monthRevenue = paidInvoices.filter(i => {
        const d = new Date((i.paidAt || i.issueDate) + "T12:00:00");
        return d.getMonth() === month && d.getFullYear() === year;
      }).reduce((s, i) => s + i.total, 0);
      const openQuotes = db.quotes.filter(q => !["Approved", "Declined", "Converted"].includes(q.status));
      const approved = db.quotes.filter(q => ["Approved", "Converted"].includes(q.status)).length;
      const sent = db.quotes.filter(q => ["Sent", "Approved", "Converted"].includes(q.status)).length || 1;
      const completedJobs = db.jobs.filter(j => ["Completed", "Invoiced", "Paid"].includes(j.status));
      const avgJob = completedJobs.length ? db.invoices.reduce((s, i) => s + i.total, 0) / db.invoices.length : 0;
      const outstanding = db.invoices.filter(i => i.status !== "Paid").reduce((s, i) => s + i.total, 0);
      const repeat = db.customers.filter(c => c.customerType === "Repeat customer").length / Math.max(db.customers.length, 1);
      return { monthRevenue, openQuotes, winRate: approved / sent, avgJob, outstanding, repeat };
    }

    function calendarMarkup(monthDate, compact) {
      const d = new Date(monthDate);
      const y = d.getFullYear(), m = d.getMonth();
      const first = new Date(y, m, 1);
      const start = new Date(first);
      start.setDate(1 - first.getDay());
      const cells = [];
      for (let i = 0; i < 42; i++) {
        const day = new Date(start);
        day.setDate(start.getDate() + i);
        const key = iso(day);
        const jobs = db.jobs.filter(j => j.scheduledDate === key);
        const w = jobs.length ? weatherFor(jobs[0]) : null;
        cells.push(`<button class="day ${day.getMonth() !== m ? "muted" : ""} ${key === iso(today()) ? "today" : ""}" data-day="${key}" type="button">
          <span class="day-num">${day.getDate()}</span>
          <span class="dot-row">${jobs.slice(0, 4).map(j => `<i class="dot" style="background:${jobColor(j.status)}"></i>`).join("")}</span>
          ${w ? weatherChip(w) : ""}
          ${!compact && jobs[0] ? `<span class="pill ${statusClass(jobs[0].status)}">${jobs.length} job${jobs.length > 1 ? "s" : ""}</span>` : ""}
        </button>`);
      }
      return `<div class="calendar"><div class="calendar-head">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(x => `<div>${x}</div>`).join("")}</div><div class="calendar-grid">${cells.join("")}</div></div>`;
    }

        <div class="photo-grid">
          ${db.photos.map((p, idx) => `<article class="photo-tile" style="background:${photoBackground(p, idx)};">
            <div><strong>${esc(p.type)}</strong><span>${esc(p.caption)}</span><span>${esc(customerName(p.customerId))}</span></div>

          <div class="section-title"><h2>Job Transformations</h2><span class="pill info">Demo placeholders</span></div>
          <div class="grid two">${db.jobs.slice(0,4).map(j => `<div>
            <div class="split-photo"><div class="before">Before</div><div class="after">After</div></div>

          </div>`).join("")}</div>

    function photoBackground(p, idx) {
      return p.dataUrl && p.dataUrl.startsWith("data:image") ? `center / cover no-repeat url('${p.dataUrl}')` : esc(p.dataUrl || PHOTO_BACKGROUNDS[idx % PHOTO_BACKGROUNDS.length]);

    function renderReports() {
      const f = ui.filters.reports || {};
      const jobs = db.jobs.filter(j =>
        (!f.status || j.status === f.status) &&
        (!f.start || j.scheduledDate >= f.start) &&
        (!f.end || j.scheduledDate <= f.end) &&
        (!f.customerType || get.customer(j.customerId)?.customerType === f.customerType)
      );
      const bySource = db.settings.leadSources.map(source => ({
        source,
        leads: db.leads.filter(l => l.source === source).length + db.customers.filter(c => c.leadSource === source).length,
        revenue: db.invoices.filter(i => get.customer(i.customerId)?.leadSource === source).reduce((s,i) => s + i.total, 0)
      }));
      const topServices = db.services.map(s => ({ name: s.name, count: db.quoteItems.filter(i => i.serviceId === s.id).length })).sort((a,b) => b.count - a.count);
      return `
        ${screenActions("Reports", "Useful field-service reporting with compact drilldowns for revenue, conversion, services, and follow-ups.", "")}
        ${filtersMarkup("reports", [
          ["start", "Date from", "date", ""],
          ["end", "Date to", "date", ""],
          ["status", "Job status", "select", ["", ...STATUSES]],
          ["customerType", "Customer type", "select", ["", "New customer", "Repeat customer"]]
        ], f)}
        <section class="grid two">
          <div class="card clickable" data-report="revenue"><div class="section-title"><h2>Revenue Over Time</h2><span class="pill good">${money(db.invoices.reduce((s,i) => s+i.total,0))}</span></div>${revenueChart()}</div>
          <div class="card clickable" data-report="conversion"><div class="section-title"><h2>Quote Conversion</h2><span class="pill info">${pct(metrics().winRate)}</span></div>${conversionMarkup()}</div>

          <div class="card clickable" data-report="sources"><div class="section-title"><h2>Lead Source Performance</h2><span class="pill">${bySource.length} sources</span></div><div class="list">${bySource.map(s => `<div class="row-card"><div><strong>${esc(s.source)}</strong><div class="meta"><span>${s.leads} records</span><span>${money(s.revenue)} revenue</span></div></div></div>`).join("")}</div></div>
          <div class="card clickable" data-report="outstanding"><div class="section-title"><h2>Outstanding Invoices</h2><span class="pill risk">${money(metrics().outstanding)}</span></div><div class="list">${db.invoices.filter(i => i.status !== "Paid").map(i => `<div class="row-card"><div><strong>${esc(customerName(i.customerId))}</strong><div class="meta"><span>${dateNice(i.issueDate)}</span><span>${money(i.total)}</span></div></div></div>`).join("")}</div></div>
          <div class="card clickable" data-report="followups"><div class="section-title"><h2>Follow-Up Opportunities</h2><span class="pill warn">${db.tasks.filter(t=>!t.done).length}</span></div><div class="list">${db.tasks.filter(t=>!t.done).map(taskRow).join("")}</div></div>
        </section>
        <div class="card" style="margin-top:14px;"><div class="section-title"><h2>Filtered Job Detail</h2><span class="pill">${jobs.length} jobs</span></div><div class="list">${jobs.map(jobCard).join("") || emptyState("No jobs match", "Change the report filters.")}</div></div>`;
    }
    function revenueChart() {
      const months = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(today());
        d.setMonth(d.getMonth() - i);
        const label = d.toLocaleDateString(undefined, { month: "short" });
        const value = db.invoices.filter(inv => {
          const id = new Date((inv.paidAt || inv.issueDate) + "T12:00:00");
          return id.getMonth() === d.getMonth() && id.getFullYear() === d.getFullYear();
        }).reduce((s, inv) => s + inv.total, 0);
        months.push({ label, value });
      }
      const max = Math.max(...months.map(m => m.value), 1);
      return `<div class="mini-chart">${months.map(m => `<div class="bar" style="height:${Math.max(8, m.value / max * 160)}px" title="${money(m.value)}"><span>${m.label}</span></div>`).join("")}</div>`;
    }
    function conversionMarkup() {
      const counts = ["Draft", "Sent", "Approved", "Converted", "Declined"].map(status => ({ status, count: db.quotes.filter(q => q.status === status).length }));
      return `<div class="list">${counts.map(c => `<div><div class="total-line"><strong>${c.status}</strong><span>${c.count}</span></div><div class="progress"><i style="width:${Math.min(100, c.count * 28)}%"></i></div></div>`).join("")}</div>`;
    }

              <div class="field"><label>Seasonal rebook months</label><input name="rebookMonths" type="number" value="${db.settings.rebookMonths}"></div>
              <div class="field full"><label>Invoice terms</label><textarea name="invoiceTerms">${esc(db.settings.invoiceTerms)}</textarea></div>
              <div class="field full"><label>Weather automation</label><textarea readonly>Forecasts are automatic per scheduled job address. Each property stores location coordinates for the demo, and new addresses are geocoded into a service-area coordinate for no-key Open-Meteo forecasts. Apps Script can later replace that helper with Maps geocoding plus UrlFetchApp.</textarea></div>

            <div class="toolbar" style="justify-content:flex-start;margin-top:14px;"><button class="danger-btn" data-action="reset-demo"><i data-lucide="refresh-ccw"></i>Reset demo data</button></div>
          </div>

        <div class="card" style="margin-top:14px;">
          <div class="section-title"><h2>Services & Pricing Rules</h2><button class="btn" data-action="new-service"><i data-lucide="plus"></i>Add service</button></div>
          <div class="table-wrap"><table>
            <thead><tr><th>Service</th><th>Mode</th><th>Minimum</th><th>Base</th><th>Per sqft</th><th>Upsells</th><th>Actions</th></tr></thead>
            <tbody>${db.services.map(s => `<tr>
              <td data-label="Service"><strong>${esc(s.name)}</strong></td>
              <td data-label="Mode">${esc(s.estimateMode)}</td>
              <td data-label="Minimum">${money(s.minimumPrice)}</td>
              <td data-label="Base">${money(s.baseRate)}</td>
              <td data-label="Per sqft">$${Number(s.perSqftRate).toFixed(2)}</td>
              <td data-label="Upsells">${esc((s.defaultUpsells || []).join(", "))}</td>
              <td data-label="Actions"><button class="ghost-btn" data-edit-service="${s.id}"><i data-lucide="pencil"></i>Edit</button></td>
            </tr>`).join("")}</tbody>
          </table></div>
        </div>`;
    }

    function screenActions(title, subtitle, actions) {
      return `<div class="screen-head"><div><p class="eyebrow">${esc(title)}</p><h2>${esc(subtitle)}</h2></div><div class="toolbar">${actions || ""}</div></div>`;
    }
    function filtersMarkup(scope, defs, values) {
      return `<div class="filters" data-filter-scope="${scope}">${defs.map(([key, label, type, opts]) => {
        const value = values[key] || "";
        if (type === "select") return `<div class="field"><label>${label}</label><select data-filter="${key}">${opts.map(o => `<option value="${esc(o)}" ${o === value ? "selected" : ""}>${esc(o || "All")}</option>`).join("")}</select></div>`;
        return `<div class="field"><label>${label}</label><input data-filter="${key}" type="${type}" value="${esc(value)}" placeholder="${label}"></div>`;
      }).join("")}</div>`;
    }

    function openModal(title, body, opts = {}) {
      const root = document.getElementById("modalRoot");
      root.className = "modal-backdrop open";
      root.innerHTML = `<div class="modal ${opts.small ? "small" : ""}" role="dialog" aria-modal="true">
        <div class="modal-head"><div><p class="eyebrow">${esc(opts.eyebrow || "PowerWash Pro")}</p><h2>${esc(title)}</h2></div><button class="icon-btn" data-close-modal title="Close"><i data-lucide="x"></i></button></div>
        <div class="modal-body">${body}</div>
      </div>`;
      bindView();
      paintIcons();
    }
    function closeModal() {
      document.getElementById("modalRoot").className = "modal-backdrop";
      document.getElementById("modalRoot").innerHTML = "";
    }

    function openKpi(key) {
      const m = metrics();
      const map = {
        monthlyRevenue: ["Monthly Revenue", `${money(m.monthRevenue)} collected this month.`, db.invoices.filter(i => i.status === "Paid")],
        openQuotes: ["Open Quotes", `${m.openQuotes.length} quotes worth ${money(m.openQuotes.reduce((s,q)=>s+q.total,0))}. Follow up after ${db.settings.followUpDays} days.`, m.openQuotes],
        winRate: ["Quote Win Rate", `${pct(m.winRate)} of sent quotes are approved or converted.`, db.quotes],
        avgJob: ["Average Job Value", `${money(m.avgJob)} average invoice value across completed work.`, db.invoices],
        outstanding: ["Outstanding Invoices", `${money(m.outstanding)} is waiting on external payment.`, db.invoices.filter(i => i.status !== "Paid")],
        repeatRate: ["Repeat Customer Rate", `${pct(m.repeat)} of customers are marked repeat.`, db.customers.filter(c => c.customerType === "Repeat customer")]
      };
      const [title, insight, rows] = map[key];
      openModal(title, `<div class="grid two"><div class="card"><h3>Insight</h3><p class="subtle" style="margin-top:8px;">${esc(insight)}</p></div><div class="card"><h3>Suggested action</h3><p class="subtle" style="margin-top:8px;">${key === "openQuotes" ? "Call or text the oldest sent quotes first and offer a bundled driveway/walkway slot." : key === "outstanding" ? "Mark payment received after an external transfer or send a reminder before scheduling new work." : "Use the detail list below to spot the next best action."}</p></div></div><div class="card" style="margin-top:14px;"><div class="section-title"><h2>Filtered Records</h2><span class="pill">${rows.length}</span></div><div class="list">${rows.map(recordSummary).join("") || emptyState("No records", "This metric has no matching records.")}</div></div>`);
    }
    function openReport(key) {
      if (key === "revenue") return openKpi("monthlyRevenue");
      if (key === "conversion") return openKpi("winRate");
      if (key === "outstanding") return openKpi("outstanding");
      if (key === "services") return openServiceReport();
      if (key === "sources") return openSourceReport();
      if (key === "followups") return openFollowupReport();
    }
    function openPipelineDetails() {
      const rows = STATUSES.map(status => ({ status, records: recordsForStatus(status) }));
      const activeValue = db.quotes.filter(q => ["Draft", "Sent", "Approved"].includes(q.status)).reduce((s,q) => s + q.total, 0);
      openModal("Pipeline Summary", `<div class="grid three">
        <div class="card"><h3>Active value</h3><div class="kpi-value">${money(activeValue)}</div><p class="subtle">Draft, sent, and approved quote value.</p></div>
        <div class="card"><h3>Scheduled work</h3><div class="kpi-value">${db.jobs.filter(j => ["Scheduled", "In Progress"].includes(j.status)).length}</div><p class="subtle">Jobs on the board now.</p></div>
        <div class="card"><h3>Follow-up load</h3><div class="kpi-value">${recordsForStatus("Follow-Up Needed").length}</div><p class="subtle">Records that need owner action.</p></div>
      </div><div class="card" style="margin-top:14px;"><div class="section-title"><h2>Status Breakdown</h2><span class="pill">${rows.reduce((s,r)=>s+r.records.length,0)} records</span></div><div class="list">${rows.map(r => `<div class="row-card"><div><strong>${esc(r.status)}</strong><div class="meta"><span>${r.records.length} record${r.records.length === 1 ? "" : "s"}</span></div><div class="progress" style="margin-top:8px;"><i style="width:${Math.min(100, r.records.length * 18)}%"></i></div></div></div>`).join("")}</div></div>`);
    }
    function openServiceReport() {
      const rows = db.services.map(service => {
        const items = db.quoteItems.filter(i => i.serviceId === service.id);
        const quoteIds = [...new Set(items.map(i => i.quoteId))];
        const quotes = db.quotes.filter(q => quoteIds.includes(q.id));
        const approved = quotes.filter(q => ["Approved", "Converted"].includes(q.status)).length;
        return { service, items, quotes, approved, value: items.reduce((s, i) => s + Number(i.unitPrice || 0), 0) };
      }).sort((a,b) => b.value - a.value);
      openModal("Top Services", `<div class="grid three">${rows.slice(0,3).map(r => `<div class="card"><h3>${esc(r.service.name)}</h3><div class="kpi-value">${money(r.value)}</div><p class="subtle">${r.items.length} quoted line items | ${r.quotes.length ? pct(r.approved / r.quotes.length) : "0%"} approval rate</p></div>`).join("")}</div><div class="card" style="margin-top:14px;"><div class="section-title"><h2>Service Performance</h2><span class="pill">${rows.length} services</span></div><div class="list">${rows.map(r => `<div class="row-card"><div><strong>${esc(r.service.name)}</strong><div class="meta"><span>${r.items.length} quote items</span><span>${money(r.value)} quoted</span><span>${r.quotes.length} related quotes</span><span>${r.quotes.length ? pct(r.approved / r.quotes.length) : "0%"} approved</span></div><p class="subtle">${esc(r.service.optionalNotes || "")}</p></div></div>`).join("")}</div></div>`);
    }
    function openSourceReport() {
      const rows = db.settings.leadSources.map(source => {
        const leads = db.leads.filter(l => l.source === source);
        const customers = db.customers.filter(c => c.leadSource === source);
        const quoteTotal = db.quotes.filter(q => customers.some(c => c.id === q.customerId)).reduce((s,q) => s + q.total, 0);
        const revenue = db.invoices.filter(i => customers.some(c => c.id === i.customerId)).reduce((s,i) => s + i.total, 0);
        return { source, leads, customers, quoteTotal, revenue, conversion: customers.length / Math.max(leads.length + customers.length, 1) };
      }).sort((a,b) => b.revenue - a.revenue);
      openModal("Lead Source Performance", `<div class="grid two">${rows.map(r => `<div class="card"><div class="section-title"><h3>${esc(r.source)}</h3><span class="pill ${r.revenue ? "good" : "info"}">${money(r.revenue)}</span></div><div class="meta"><span>${r.leads.length} active leads</span><span>${r.customers.length} customers</span><span>${pct(r.conversion)} customer conversion</span><span>${money(r.quoteTotal)} quoted</span></div><div class="progress" style="margin-top:10px;"><i style="width:${Math.round(r.conversion * 100)}%"></i></div></div>`).join("")}</div><div class="card" style="margin-top:14px;"><div class="section-title"><h2>Source Records</h2><span class="pill">${rows.reduce((s,r)=>s+r.leads.length+r.customers.length,0)} records</span></div><div class="list">${rows.flatMap(r => [...r.leads.map(l => `<div class="row-card"><div><strong>${esc(l.name)}</strong><div class="meta"><span>${esc(r.source)}</span><span>${esc(l.status)}</span><span>Lead</span></div></div></div>`), ...r.customers.map(c => `<div class="row-card"><div><strong>${esc(c.name)}</strong><div class="meta"><span>${esc(r.source)}</span><span>${esc(c.customerType)}</span><span>Customer</span></div></div></div>`)]).join("")}</div></div>`);
    }
    function openFollowupReport() {
      const { tasks, staleQuotes, unpaid, seasonal } = followupBuckets();
      openModal("Follow-Up Opportunities", `<div class="grid four">
        ${followupMetricCard("tasks", "Open tasks", String(tasks.length), "Manual reminders", "check-circle-2", "warn")}
        ${followupMetricCard("quotes", "Stale quotes", String(staleQuotes.length), "Need quote follow-up", "file-clock", "risk")}
        ${followupMetricCard("invoices", "Unpaid invoices", String(unpaid.length), money(unpaid.reduce((s,i)=>s+i.total,0)), "receipt", "risk")}
        ${followupMetricCard("seasonal", "Seasonal rebooks", String(seasonal.length), "Properties due", "repeat-2", "good")}
      </div><div class="card" style="margin-top:14px;"><div class="section-title"><h2>Follow-Up Queue</h2><span class="pill warn">${tasks.length + staleQuotes.length + unpaid.length + seasonal.length} records</span></div><div class="list">
        ${tasks.map(taskRow).join("")}
        ${staleQuotes.map(q => `<div class="row-card"><div><strong>Quote follow-up: ${esc(customerName(q.customerId))}</strong><div class="meta"><span>${esc(q.status)}</span><span>${money(q.total)}</span><span>Created ${dateNice(q.createdAt)}</span></div></div></div>`).join("")}
        ${unpaid.map(i => `<div class="row-card"><div><strong>Unpaid invoice: ${esc(customerName(i.customerId))}</strong><div class="meta"><span>${money(i.total)}</span><span>Issued ${dateNice(i.issueDate)}</span></div></div></div>`).join("")}
        ${seasonal.map(p => `<div class="row-card"><div><strong>Seasonal rebooking: ${esc(customerName(p.customerId))}</strong><div class="meta"><span>${esc(p.address)}</span><span>Last cleaned ${dateNice(p.lastCleaningDate)}</span></div></div></div>`).join("")}
      </div></div>`);
    }
    function followupBuckets() {
      const quoteCutoff = new Date(today());
      quoteCutoff.setDate(quoteCutoff.getDate() - db.settings.followUpDays);
      return {
        tasks: db.tasks.filter(t => !t.done),
        staleQuotes: db.quotes.filter(q => ["Draft", "Sent"].includes(q.status) && new Date(q.createdAt + "T12:00:00") <= quoteCutoff),
        unpaid: db.invoices.filter(i => i.status !== "Paid"),
        seasonal: db.properties.filter(p => {
          const d = new Date(p.lastCleaningDate + "T12:00:00");
          d.setMonth(d.getMonth() + Number(db.settings.rebookMonths || 9));
          return d <= today();
        })
      };
    }
    function followupMetricCard(type, title, value, detail, icon, tone) {
      return `<article class="card clickable kpi-card" data-followup-type="${type}">
        <div class="kpi-top"><div><div class="subtle">${esc(title)}</div><div class="kpi-value">${esc(value)}</div></div><div class="kpi-icon ${tone}"><i data-lucide="${icon}"></i></div></div>
        <div class="delta ${tone === "risk" ? "warn" : ""}">${esc(detail)}</div>
      </article>`;
    }
    function openFollowupDetail(type) {
      const { tasks, staleQuotes, unpaid, seasonal } = followupBuckets();
      const views = {

    function buildLine(service, prop, quoteId) {
      prop = prop || db.properties[0] || { sqft: 2000, stories: 1 };
      const sqft = service.estimateMode === "flat" ? 0 : Math.round((service.estimateMode === "property" ? prop.sqft * .55 : 650));
      const story = service.estimateMode === "property" ? Math.max(1, prop.stories || 1) : 1;
      const calc = Math.max(service.minimumPrice, service.baseRate + (sqft * service.perSqftRate * story));
      return { id: uid("qi"), quoteId, serviceId: service.id, description: service.name, qty: 1, sqft, unitPrice: Math.round(calc), calculatedPrice: Math.round(calc), manualOverride: false, notes: service.optionalNotes };
    }
    function lineMarkup(item) {
      return `<div class="line-item" data-line="${item.id}">
        <div class="field"><label>Service</label><input data-line-field="description" value="${esc(item.description)}"></div>
        <div class="field"><label>Qty</label><input data-line-field="qty" type="number" min="1" value="${item.qty}"></div>
        <div class="field"><label>Sq ft</label><input data-line-field="sqft" type="number" min="0" value="${item.sqft}"></div>
        <div class="field"><label>Price</label><input data-line-field="unitPrice" type="number" min="0" value="${item.unitPrice}"></div>
        <div class="field"><label>Override</label><select data-line-field="manualOverride"><option value="false" ${!item.manualOverride?"selected":""}>Auto</option><option value="true" ${item.manualOverride?"selected":""}>Manual</option></select></div>
        <button type="button" class="danger-btn remove-line" data-remove-line="${item.id}"><i data-lucide="trash-2"></i></button>
      </div>`;
    }
    function suggestionMarkup(suggestions) {
      return suggestions.length ? `<div class="card" style="box-shadow:none;background:var(--panel-2);margin-top:10px;"><div class="section-title"><h3>Smart add-ons</h3><span class="pill good">One tap</span></div><div class="toolbar" style="justify-content:flex-start;">${suggestions.map(s => `<button class="ghost-btn" type="button" data-add-suggestion="${esc(s.id)}"><i data-lucide="sparkles"></i>${esc(s.name)}</button>`).join("")}</div></div>` : "";
    }
    function suggestUpsells(items) {
      const names = new Set(items.map(i => i.description));
      const suggestions = new Map();
      items.forEach(i => (get.service(i.serviceId)?.defaultUpsells || []).forEach(name => {
        if (!names.has(name)) {
          const svc = db.services.find(s => s.name === name);
          if (svc) suggestions.set(svc.id, svc);
        }
      }));
      return [...suggestions.values()];
    }
    function syncQuoteLinesFromDom() {
      document.querySelectorAll("[data-line]").forEach(row => {
        const item = window.activeQuoteItems.find(i => i.id === row.dataset.line);
        if (!item) return;
        row.querySelectorAll("[data-line-field]").forEach(input => {
          const k = input.dataset.lineField;
          item[k] = ["qty","sqft","unitPrice"].includes(k) ? Number(input.value) : k === "manualOverride" ? input.value === "true" : input.value;
        });
      });
    }
    function recalcQuoteBuilder() {
      syncQuoteLinesFromDom();
      const propId = document.querySelector("#quoteForm select[name='propertyId']")?.value;
      const prop = get.property(propId) || db.properties[0];
      window.activeQuoteItems.forEach(item => {
        const svc = get.service(item.serviceId);
        if (!svc || item.manualOverride) return;
        const story = svc.estimateMode === "property" ? Math.max(1, prop?.stories || 1) : 1;
        const condition = svc.conditionMultiplier || 1;
        const access = svc.accessMultiplier || 1;
        item.calculatedPrice = Math.round(Math.max(svc.minimumPrice, svc.baseRate + (Number(item.sqft || 0) * svc.perSqftRate * story * condition * access)));
        item.unitPrice = item.calculatedPrice;
      });
      const subtotal = window.activeQuoteItems.reduce((s, i) => s + Number(i.unitPrice || 0) * Number(i.qty || 1), 0);
      const tax = subtotal * Number(db.settings.taxRate || 0);
      const total = subtotal + tax;
      const box = document.getElementById("quoteTotals");
      if (box) box.innerHTML = `<div class="total-box"><div class="total-line"><span>Subtotal</span><strong>${money(subtotal)}</strong></div><div class="total-line"><span>Tax (${(db.settings.taxRate*100).toFixed(2)}%)</span><strong>${money(tax)}</strong></div><div class="total-line big"><span>Total</span><strong>${money(total)}</strong></div></div>`;
      const suggestBox = document.getElementById("quoteSuggestions");
      if (suggestBox) suggestBox.innerHTML = suggestionMarkup(suggestUpsells(window.activeQuoteItems));
      bindSmartAddons();
      paintIcons();
    }

    async function fetchWeather(force) {
      if (!force && ui.weatherLoadedAt && Date.now() - ui.weatherLoadedAt < 1000 * 60 * 30) return;
      const todayKey = iso(today());
      const jobs = db.jobs.filter(j => j.scheduledDate >= todayKey).slice(0, 18);
      const grouped = new Map();
      jobs.forEach(job => {
        const coords = jobCoordinates(job);
        const key = `${coords.latitude.toFixed(4)},${coords.longitude.toFixed(4)}`;
        if (!grouped.has(key)) grouped.set(key, { coords, jobs: [] });
        grouped.get(key).jobs.push(job);
      });
      const nextWeather = {};
      await Promise.all([...grouped.values()].map(async group => {
        const { latitude, longitude } = group.coords;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(latitude)}&longitude=${encodeURIComponent(longitude)}&daily=weather_code,temperature_2m_max,precipitation_probability_max,wind_speed_10m_max&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=16`;
        try {
          const res = await fetch(url);
          const data = await res.json();
          group.jobs.forEach(job => {
            const idx = (data.daily?.time || []).indexOf(job.scheduledDate);
            if (idx < 0) return;
            nextWeather[job.id] = weatherFromDaily(data, idx);
          });
        } catch (e) {
          console.warn("Weather unavailable for job address", e);
        }
      }));
      ui.weather = nextWeather;
      ui.weatherLoadedAt = Date.now();
      if (document.getElementById("view")) render();
    }
    function weatherFromDaily(data, idx) {
      const precip = data.daily.precipitation_probability_max[idx] ?? 0;
      const wind = data.daily.wind_speed_10m_max[idx] ?? 0;
      const temp = Math.round(data.daily.temperature_2m_max[idx] ?? 0);
      const code = data.daily.weather_code[idx];
      const risk = precip >= 60 || wind >= 22 ? "risk" : precip >= 35 || temp < 45 || wind >= 16 ? "caution" : "good";
      const condition = weatherCode(code);
      return { temp, precip, wind: Math.round(wind), condition: condition.label, icon: condition.icon, label: risk === "good" ? "Good" : risk === "caution" ? "Caution" : "Risk", badgeClass: risk === "good" ? "good" : risk === "caution" ? "warn" : "risk" };
    }
    function weatherFor(job) { return job?.id ? ui.weather[job.id] : null; }
    function jobCoordinates(job) {
      const prop = get.property(job.propertyId);
      if (prop?.latitude && prop?.longitude) return { latitude: Number(prop.latitude), longitude: Number(prop.longitude) };
      return geocodeAddress(prop?.address || propertyAddress(job.propertyId));
    }
    function geocodeAddress(address) {
      let hash = 0;
      String(address || "service area").split("").forEach(ch => { hash = ((hash << 5) - hash + ch.charCodeAt(0)) | 0; });
      const latOffset = ((Math.abs(hash) % 900) / 10000) - 0.045;
      const lonOffset = ((Math.abs(hash >> 8) % 900) / 10000) - 0.045;
      return { latitude: 32.7767 + latOffset, longitude: -96.7970 + lonOffset };
    }
    function weatherCode(code) {
      if ([0,1].includes(code)) return { label: "Clear", icon: "&#x2600;&#xfe0f;" };
      if ([2].includes(code)) return { label: "Partly cloudy", icon: "&#x26c5;" };
      if ([3,45,48].includes(code)) return { label: "Clouds", icon: "&#x2601;&#xfe0f;" };
      if ([51,53,55,61,63,65,80,81,82].includes(code)) return { label: "Rain", icon: "&#x1f327;&#xfe0f;" };
      if ([71,73,75,77,85,86].includes(code)) return { label: "Snow", icon: "&#x2744;&#xfe0f;" };
      if ([95,96,99].includes(code)) return { label: "Storms", icon: "&#x26c8;&#xfe0f;" };
      return { label: "Mixed", icon: "&#x1f324;&#xfe0f;" };
    }

      document.querySelectorAll("[data-filter-scope]").forEach(scope => {
        scope.querySelectorAll("[data-filter]").forEach(input => input.oninput = () => {

          const restore = () => requestAnimationFrame(() => {

            if (restored) {

            }
          });
          const delay = input.tagName === "INPUT" && ["search", "text"].includes(input.type);
          clearTimeout(ui.filterTimers[`${scopeName}.${key}`]);
          if (delay) {
            ui.filterTimers[`${scopeName}.${key}`] = setTimeout(() => { render(); restore(); }, 180);
          } else {
            render();
            restore();
          }
        });
      });
      document.querySelectorAll("[data-edit-lead]").forEach(b => b.onclick = () => openLeadForm(b.dataset.editLead));
      document.querySelectorAll("[data-delete-lead]").forEach(b => b.onclick = () => deleteRecord("leads", b.dataset.deleteLead, "lead"));
      document.querySelectorAll("[data-lead-quote]").forEach(b => b.onclick = () => openQuoteBuilder("", b.dataset.leadQuote));
      document.querySelectorAll("[data-edit-customer]").forEach(b => b.onclick = () => openCustomerForm(b.dataset.editCustomer));
      document.querySelectorAll("[data-view-customer]").forEach(b => b.onclick = () => openCustomerProfile(b.dataset.viewCustomer));
      document.querySelectorAll("[data-upload-photo]").forEach(b => b.onclick = () => openPhotoUpload(b.dataset.uploadPhoto));
      document.querySelectorAll("[data-delete-customer]").forEach(b => b.onclick = () => deleteRecord("customers", b.dataset.deleteCustomer, "customer"));
      document.querySelectorAll("[data-edit-job]").forEach(b => b.onclick = () => openJobForm(b.dataset.editJob));
      document.querySelectorAll("[data-status-job]").forEach(b => b.onclick = () => openStatusPicker("job", b.dataset.statusJob));
      document.querySelectorAll("[data-edit-quote]").forEach(b => b.onclick = () => openQuoteBuilder(b.dataset.editQuote));
      document.querySelectorAll("[data-quote-status]").forEach(b => b.onclick = () => openStatusPicker("quote", b.dataset.quoteStatus));
      document.querySelectorAll("[data-convert-quote]").forEach(b => b.onclick = () => convertQuote(b.dataset.convertQuote));
      document.querySelectorAll("[data-print-quote]").forEach(b => b.onclick = () => printInvoice(b.dataset.printQuote, true));
      document.querySelectorAll("[data-print-invoice]").forEach(b => b.onclick = () => printInvoice(b.dataset.printInvoice));
      document.querySelectorAll("[data-pdf-invoice]").forEach(b => b.onclick = () => downloadInvoicePdf(b.dataset.pdfInvoice));
      document.querySelectorAll("[data-email-invoice]").forEach(b => b.onclick = () => emailInvoice(b.dataset.emailInvoice));
      document.querySelectorAll("[data-pay-invoice]").forEach(b => b.onclick = () => markPaid(b.dataset.payInvoice));
      document.querySelectorAll("[data-edit-service]").forEach(b => b.onclick = () => openServiceForm(b.dataset.editService));
      document.querySelectorAll("[data-save-settings]").forEach(b => b.onclick = saveSettings);
      document.querySelectorAll("[data-complete-task]").forEach(b => b.onclick = () => { const t = db.tasks.find(x => x.id === b.dataset.completeTask); if (t) t.done = true; saveDb(); render(); toast("Reminder completed"); });
      document.querySelectorAll("[data-job-status-inline]").forEach(s => s.onchange = () => { const j = get.job(s.dataset.jobStatusInline); j.status = s.value; saveDb(); toast("Job status updated"); openDay(j.scheduledDate); });
      const jobCustomer = document.querySelector("#jobForm select[name='customerId']");
      if (jobCustomer) jobCustomer.onchange = () => {
        document.getElementById("jobPropertySlot").innerHTML = jobPropertyField(jobCustomer.value, "");
        paintIcons();
      };
      const photoCustomer = document.querySelector("#photoForm select[name='customerId']");
      if (photoCustomer) photoCustomer.onchange = () => {
        document.getElementById("photoJobSlot").innerHTML = photoJobField(photoCustomer.value, "");
      };
      document.querySelectorAll("input[name='requestedServices']").forEach(box => box.onchange = () => {
        const form = box.closest("form");
        const summary = form?.querySelector("[data-service-summary]");
        if (summary) {
          const picked = [...form.querySelectorAll("input[name='requestedServices']:checked")].map(x => x.value);
          summary.textContent = picked.length ? picked.join(", ") : "Choose services";
        }
      });
      document.querySelectorAll("[data-add-service]").forEach(b => b.onclick = () => addQuoteService(b.dataset.addService));
      bindSmartAddons();
      document.querySelectorAll("[data-remove-line]").forEach(b => b.onclick = () => { window.activeQuoteItems = window.activeQuoteItems.filter(i => i.id !== b.dataset.removeLine); document.getElementById("quoteLines").innerHTML = window.activeQuoteItems.map(lineMarkup).join("") || emptyState("No services yet", "Tap a service preset to build the estimate."); bindView(); recalcQuoteBuilder(); });
      document.querySelectorAll("[data-line-field], #quoteForm select[name='propertyId']").forEach(input => input.oninput = recalcQuoteBuilder);
      document.querySelectorAll("[data-quote-save]").forEach(b => b.onclick = () => saveQuote(document.getElementById("quoteForm"), b.dataset.quoteSave));
      const forms = {
        leadForm: saveLead,
        customerForm: saveCustomer,
        jobForm: saveJob,
        statusForm: saveStatus,
        quoteForm: form => saveQuote(form),
        invoiceForm: saveInvoice,
        photoForm: savePhoto,
        serviceForm: saveService
      };
      Object.entries(forms).forEach(([id, handler]) => {
        const form = document.getElementById(id);
        if (form) form.onsubmit = e => { e.preventDefault(); handler(form); };
      });
    }

    render();
    fetchWeather();
  </script>
</body>
</html>
